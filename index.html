<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CampCon ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a1a;overflow:hidden;width:100vw;height:100vh;font-family:'Arial Black',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
.screen.hidden{display:none;}

/* LOGIN */
#loginScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);}
#loginScreen h1{font-size:clamp(36px,10vw,72px);color:#FFD700;text-shadow:0 0 30px #FF6600;letter-spacing:6px;margin-bottom:8px;}
#loginScreen p{color:#aaa;font-size:clamp(12px,3vw,18px);margin-bottom:40px;}
.btnGoogle{display:flex;align-items:center;gap:12px;background:#fff;color:#333;font-family:'Arial Black',sans-serif;font-size:clamp(14px,3.5vw,20px);padding:14px 28px;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.btnGoogle img{width:28px;}
.btnGoogle:hover{background:#f0f0f0;}

/* LOBBY */
#lobbyScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:16px;}
#lobbyScreen h2{font-size:clamp(22px,6vw,42px);color:#FFD700;margin-bottom:8px;}
.userInfo{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);padding:10px 20px;border-radius:30px;margin-bottom:16px;}
.userInfo img{width:36px;height:36px;border-radius:50%;}
.userInfo span{font-size:14px;color:#ddd;}
.btnMain{font-family:'Arial Black',sans-serif;font-size:clamp(14px,3.5vw,20px);padding:14px 36px;border:none;border-radius:10px;cursor:pointer;letter-spacing:2px;margin:6px;}
.btnCreate{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnJoin{background:linear-gradient(135deg,#0066ff,#00ccff);color:#fff;}
.btnLogout{background:rgba(255,255,255,0.1);color:#aaa;font-size:12px;padding:8px 16px;margin-top:8px;}
#roomCodeInput{font-family:'Arial Black',sans-serif;font-size:20px;padding:12px 20px;border-radius:8px;border:2px solid #0066ff;background:#111;color:#fff;text-align:center;letter-spacing:4px;width:160px;text-transform:uppercase;}
#joinForm{display:flex;gap:8px;align-items:center;}

/* WAITING */
#waitingScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:20px;}
#waitingScreen h2{font-size:clamp(20px,5vw,36px);color:#FFD700;}
.roomCode{font-size:clamp(36px,10vw,64px);color:#00ccff;letter-spacing:8px;background:rgba(0,204,255,0.1);padding:16px 32px;border-radius:12px;border:2px solid #00ccff;}
.waitDots{font-size:18px;color:#aaa;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btnCancel{background:rgba(255,255,255,0.1);color:#aaa;font-size:14px;padding:10px 24px;}

/* WIN */
#winScreen{background:rgba(0,0,0,0.9);gap:20px;}
#winScreen h2{font-size:clamp(32px,9vw,80px);color:#FFD700;text-shadow:0 0 40px #FF6600;text-align:center;}
.btnRevanche{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnLobby{background:rgba(255,255,255,0.1);color:#fff;font-size:14px;padding:10px 24px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
  <h1>⚡ CAMPCON ⚡</h1>
  <p>Banda del Estu — Machi vs Mauron</p>
  <button class="btnGoogle" id="btnGoogle">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Entrar con Google
  </button>
</div>

<!-- LOBBY -->
<div class="screen hidden" id="lobbyScreen">
  <h2>🥊 LOBBY</h2>
  <div class="userInfo">
    <img id="userAvatar" src="" alt="">
    <span id="userName"></span>
  </div>
  <button class="btnMain btnCreate" id="btnCreate">⚡ CREAR SALA</button>
  <div id="joinForm">
    <input id="roomCodeInput" maxlength="4" placeholder="XXXX" />
    <button class="btnMain btnJoin" id="btnJoin">UNIRSE</button>
  </div>
  <button class="btnMain btnLogout" id="btnLogout">Cerrar sesión</button>
</div>

<!-- WAITING -->
<div class="screen hidden" id="waitingScreen">
  <h2>Compartí el código</h2>
  <div class="roomCode" id="displayCode">----</div>
  <p class="waitDots">Esperando al rival...</p>
  <button class="btnMain btnCancel" id="btnCancel">Cancelar</button>
</div>

<!-- GAME CANVAS -->
<canvas id="c" style="display:none;"></canvas>

<!-- WIN -->
<div class="screen hidden" id="winScreen">
  <h2 id="winTxt"></h2>
  <button class="btnMain btnRevanche" id="btnRevanche">🥊 REVANCHA</button>
  <button class="btnMain btnLobby" id="btnLobbyBack">Volver al lobby</button>
</div>

// ── SCREENS ─────────────────────────────────────────────────────
const $ =id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$(id).classList.remove('hidden');}
function showCanvas(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$('c').style.display='block';}
function hideCanvas(){$('c').style.display='none';}

// ── AUTH ─────────────────────────────────────────────────────────
let currentUser=null,myRole=null,roomCode=null,roomRef=null,gameLoopInt=null;

$('btnGoogle').onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());
$('btnLogout').onclick=()=>signOut(auth);

onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    $('userName').textContent=user.displayName||user.email;
    $('userAvatar').src=user.photoURL||'';
    show('lobbyScreen');
  } else {
    currentUser=null;
    show('loginScreen');
  }
});

// ── ROOM CODE ────────────────────────────────────────────────────
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}

$('btnCreate').onclick=async()=>{
  roomCode=genCode();
  roomRef=ref(db,`rooms/${roomCode}`);
  await set(roomRef,{
    host:currentUser.uid,
    hostName:currentUser.displayName,
    hostChar:'machi',
    guest:null,
    guestName:null,
    guestChar:'mauron',
    status:'waiting',
    state:null
  });
  myRole='host';
  $('displayCode').textContent=roomCode;
  show('waitingScreen');
  // watch for guest
  onValue(roomRef,snap=>{
    const d=snap.val();
    if(!d) return;
    if(d.status==='ready'&&d.guest){
      off(roomRef);
      startGame();
    }
  });
};

$('btnJoin').onclick=async()=>{
  const code=$('roomCodeInput').value.trim().toUpperCase();
  if(code.length!==4){alert('Ingresá un código de 4 letras');return;}
  roomCode=code;
  roomRef=ref(db,`rooms/${roomCode}`);
  const snap=await get(roomRef);
  if(!snap.exists()){alert('Sala no encontrada');return;}
  const d=snap.val();
  if(d.status!=='waiting'){alert('La sala ya está en juego');return;}
  await update(roomRef,{
    guest:currentUser.uid,
    guestName:currentUser.displayName,
    status:'ready'
  });
  myRole='guest';
  startGame();
};

$('btnCancel').onclick=async()=>{
  if(roomRef) await remove(roomRef);
  roomRef=null; roomCode=null; myRole=null;
  show('lobbyScreen');
};

// ── SPRITES ──────────────────────────────────────────────────────
function removeChroma(img){
  const oc=document.createElement('canvas');
  oc.width=img.naturalWidth;oc.height=img.naturalHeight;
  const ox=oc.getContext('2d');ox.drawImage(img,0,0);
  const d=ox.getImageData(0,0,oc.width,oc.height);
  for(let i=0;i<d.data.length;i+=4){
    const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
    if(g>90&&g>r*1.25&&g>b*1.25)d.data[i+3]=0;
    else if(b>90&&b>r*1.15&&b>g*1.15)d.data[i+3]=0;
  }
  ox.putImageData(d,0,0);return oc;
}
async function loadImg(path){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>res(removeChroma(img));
    img.onerror=()=>res(null);
    img.src=BASE+path;
  });
}

let SP={machi:{},mauron:{},bg:null};

async function loadSprites(){
  if(spritesLoaded)return;
  async function loadGroup(paths){
    const out={};
    for(const[k,arr]of Object.entries(paths)){
      out[k]=await Promise.all(arr.map(p=>loadImg(p)));
    }
    return out;
  }
  [SP.machi,SP.mauron,SP.bg]=await Promise.all([
    loadGroup(PATHS.machi),loadGroup(PATHS.mauron),
    loadImg('Escenarios_001_Estudiantil_v2.png')

// ── CANVAS SETUP ─────────────────────────────────────────────────
const canvas=$('c');
const ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H);canvas.style.width=s*W+'px';canvas.style.height=s*H+'px';}
resize();window.addEventListener('resize',resize);

// ── GAME STATE ───────────────────────────────────────────────────
// host=p1(left)=machi, guest=p2(right)=mauron
let gs={
  p1:{x:200,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:1,blocking:false,grounded:true},
  p2:{x:700,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:-1,blocking:false,grounded:true},
  timer:90,phase:'fight', // fight|special|ko
  specialName:null,
};
let fTimer={p1:0,p2:0};
let hitCD={p1:0,p2:0};
let invincible={p1:0,p2:0};
let bgOffset=0;
let tickCount=0;
let specialPhase=null;
let myKey=null; // 'p1' or 'p2'
let oppKey=null;
let timerInt=null;
let inputState={left:false,right:false,jump:false,attack:false,block:false,special:false,kick:false};

// ── FIGHTER DRAW ─────────────────────────────────────────────────
function getFrames(p,state){
  const charKey=p==='p1'?'machi':'mauron';
  const s=SP[charKey];
  if(!s)return[];
  const st=state||gs[p].state;
  if(st==='idle')return s.idle||[];
  if(st==='walk')return s.walk||[];
  if(st==='jump')return s.jump||[];
  if(st==='attack')return s.attack||[];
  if(st==='special')return s.special||[];
  if(st==='block')return s.block||[];
  if(st==='hurt')return s.hurt||[];
  if(st==='ko')return s.ko||[];
  if(st==='celeb')return s.celeb||[];
  return s.idle||[];
}

function drawFighter(p){
  const f=gs[p];
  const frames=getFrames(p);
  const img=frames[Math.min(f.frame,frames.length-1)];
  const H2=170;
  if(!img){
    ctx.fillStyle=p==='p1'?'#8B6914':'#3a6b30';
    ctx.fillRect(f.x-45,f.y-H2,90,H2);
    ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText(p==='p1'?'MACHI':'MAURON',f.x,f.y-H2/2);
    return;
  }
  const scale=H2/img.height||1;
  const dw=img.width*scale,dh=img.height*scale;
  ctx.save();
  ctx.translate(f.x,f.y);
  ctx.scale(f.facing,-1);
  if(f.state==='hurt')ctx.globalAlpha=0.65;
  ctx.drawImage(img,-dw/2,0,dw,-dh);
  ctx.restore();
  if(f.blocking){
    ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#4af';
    ctx.beginPath();ctx.ellipse(f.x+(f.facing>0?30:-30),f.y-H2/2,35,68,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
}

// ── HUD ──────────────────────────────────────────────────────────
function drawHUD(){
  const bW=310,bH=20,spH=9,y1=12,y2=y1+bH+3;
  function bar(x,w,pct,right){
    ctx.fillStyle='#111';ctx.fillRect(x,y1,w,bH);
    const fw=w*Math.max(0,pct);
    ctx.fillStyle='#e63946';ctx.fillRect(right?x+w-fw:x,y1,fw,bH);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.strokeRect(x,y1,w,bH);
  }
  function spBar(x,w,pct,col,right){
    ctx.fillStyle='#111';ctx.fillRect(x,y2,w,spH);
    const fw=w*Math.max(0,pct);
    ctx.fillStyle=col;ctx.fillRect(right?x+w-fw:x,y2,fw,spH);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y2,w,spH);
    if(pct>=1){ctx.save();ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.008);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y2,w,spH);ctx.restore();}
  }
  bar(10,bW,gs.p1.hp/100,false);spBar(10,bW,gs.p1.special/SPMAX,'#FFD700',false);
  ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='left';ctx.fillText('MACHI',12,y1+14);
  bar(W-10-bW,bW,gs.p2.hp/100,true);spBar(W-10-bW,bW,gs.p2.special/SPMAX,'#00FF7F',true);
  ctx.textAlign='right';ctx.fillText('MAURON',W-12,y1+14);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(W/2-28,8,56,30,6);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=gs.timer<=10?'#ff4444':'#fff';
  ctx.font='bold 22px Arial Black';ctx.textAlign='center';ctx.fillText(Math.ceil(gs.timer),W/2,30);
  if(gs.p1.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#FFD700';ctx.font='bold 9px Arial';ctx.textAlign='left';ctx.fillText('⚡LISTO!',12,y2+spH+10);ctx.restore();}
  if(gs.p2.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#00FF7F';ctx.font='bold 9px Arial';ctx.textAlign='right';ctx.fillText('⚡LISTO!',W-12,y2+spH+10);ctx.restore();}
}

// ── CONTROLS UI ──────────────────────────────────────────────────
function drawControls(){
  ctx.save();ctx.globalAlpha=0.55;
  const B=(x,y,r,lbl,c)=>{
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`bold ${r*0.65}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lbl,x,y);ctx.textBaseline='alphabetic';
  };
  B(48,H-58,27,'◀','#334');B(112,H-58,27,'▶','#334');B(80,H-114,27,'▲','#343');
  B(W-48,H-58,27,'P','#443');B(W-104,H-58,27,'B','#433');B(W-160,H-88,27,'S','#334');
  ctx.restore();
}

// ── SPECIAL OVERLAY ──────────────────────────────────────────────
function drawSpecialOverlay(){
  const s=specialPhase;if(!s)return;
  const isMachi=s.name==='MACHI';
  const attackName=isMachi?'CHAMPAGNE SUPERNOVA':'ABSOLUT PLANTS';
  const col=isMachi?'#FFD700':'#00FF7F';
  ctx.save();
  ctx.fillStyle=s.t%8<4?'rgba(255,200,0,0.18)':'rgba(0,50,200,0.18)';ctx.fillRect(0,0,W,H);
  const maxX=W*0.55;
  const px=s.t<35?-maxX+(s.t/35)*maxX:(s.t>110?maxX-((s.t-110)/40)*maxX*2:0);
  ctx.translate(px,0);
  const grad=ctx.createLinearGradient(0,H*0.28,maxX,H*0.72);
  grad.addColorStop(0,'rgba(0,0,0,0.96)');grad.addColorStop(1,col+'22');
  ctx.fillStyle=grad;ctx.fillRect(0,H*0.28,maxX,H*0.44);
  ctx.strokeStyle=col;ctx.lineWidth=3;ctx.strokeRect(0,H*0.28,maxX,H*0.44);
  const celebSp=isMachi?SP.machi:SP.mauron;
  const cf=(celebSp.celeb||[])[Math.floor(s.t/15)%Math.max(1,(celebSp.celeb||[]).length)];
  if(cf){const ch=H*0.38,cw=cf.width*(ch/cf.height);ctx.save();ctx.translate(maxX*0.72,H*0.72);ctx.scale(-1,-1);ctx.drawImage(cf,-cw/2,0,cw,-ch);ctx.restore();}
  ctx.shadowColor=col;ctx.shadowBlur=25;ctx.fillStyle=col;
  ctx.font='bold '+Math.floor(W*0.042)+'px Arial Black';ctx.textAlign='center';ctx.fillText(attackName,maxX*0.42,H*0.52);
  ctx.font='bold '+Math.floor(W*0.025)+'px Arial';ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.fillText(s.name,maxX*0.42,H*0.38);
  ctx.restore();
  s.t++;
  if(s.t>=150){specialPhase=null;gs.phase='fight';}
}

// ── BACKGROUND ───────────────────────────────────────────────────
function drawBg(){
  if(SP.bg){const bW=W*1.4,bH=H*0.78;ctx.drawImage(SP.bg,-bgOffset*(bW-W),H-bH,bW,bH);}
  else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0d1b2a');g.addColorStop(0.65,'#1b3a5c');g.addColorStop(1,'#c8a060');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#a07040';ctx.fillRect(0,FLOOR,W,H-FLOOR);}
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}

// ── GAME LOGIC (host runs simulation) ────────────────────────────
function applyInput(pKey,input){
  const p=gs[pKey];
  if(p.state==='ko')return;
  const oKey=pKey==='p1'?'p2':'p1';
  const opp=gs[oKey];

  // movement
  if(input.left){p.x-=3.5;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(input.right){p.x+=3.5;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(p.state==='walk')p.state='idle';
  p.x=Math.max(50,Math.min(W-50,p.x));

  // jump
  if(input.jump&&p.grounded){p.vy=-14;p.grounded=false;p.state='jump';p.frame=0;}

  // block
  p.blocking=input.block&&p.grounded;
  if(p.blocking&&p.state!=='attack')p.state='block';
  else if(!p.blocking&&p.state==='block')p.state='idle';

  // face
  if(!['attack','special','hurt','ko','block'].includes(p.state))
    p.facing=opp.x>p.x?1:-1;

  // attack
  if(input.attack&&!['ko','hurt'].includes(p.state)&&hitCD[pKey]===0){
    p.state='attack';p.frame=0;
    const reach=110;
    const bx=p.x+(p.facing>0?5:-5-reach);
    const oh=170;
    if(bx<opp.x+45&&bx+reach>opp.x-45&&p.y-oh<opp.y&&p.y>opp.y-oh){
      if(!opp.blocking&&invincible[oKey]===0){
        opp.hp=Math.max(0,opp.hp-10);
        opp.state='hurt';invincible[oKey]=18;
        p.special=Math.min(SPMAX,p.special+12);
        if(opp.hp<=0){opp.state='ko';endGame();}
      } else if(opp.blocking){
        opp.hp=Math.max(0,opp.hp-2);
        p.special=Math.min(SPMAX,p.special+5);
      }
      hitCD[pKey]=25;
    }
  }

  // special
  if(input.special&&p.special>=SPMAX&&!['ko','hurt'].includes(p.state)){
    p.special=0;p.state='special';p.frame=0;
    gs.phase='special';
    gs.specialName=pKey==='p1'?'MACHI':'MAURON';
    specialPhase={name:gs.specialName,t:0};
    // deal damage
    const opp2=gs[oKey];
    if(!opp2.blocking){opp2.hp=Math.max(0,opp2.hp-35);if(opp2.hp<=0){opp2.state='ko';endGame();}}
    else opp2.hp=Math.max(0,opp2.hp-7);
  }
}

function physicsTick(){
  ['p1','p2'].forEach(pk=>{
    const p=gs[pk];
    if(p.state==='ko')return;
    if(invincible[pk]>0)invincible[pk]--;
    if(hitCD[pk]>0)hitCD[pk]--;
    if(!p.grounded){p.vy+=G;p.y+=p.vy;}
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.grounded=true;if(p.state==='jump')p.state='idle';}
    // frame advance
    fTimer[pk]++;
    const spd=p.state==='special'?5:p.state==='attack'?4:7;
    if(fTimer[pk]>=spd){fTimer[pk]=0;p.frame++;}
    const frames=getFrames(pk);
    if(frames.length){
      const loop=!['ko','hurt'].includes(p.state);
      if(p.frame>=frames.length)p.frame=loop?0:frames.length-1;
    }
    // auto-reset attack state
    if(p.state==='attack'&&p.frame>=getFrames(pk,'attack').length-1){p.state='idle';p.frame=0;}
    if(p.state==='hurt'&&p.frame>=getFrames(pk,'hurt').length-1){p.state='idle';p.frame=0;}
  });
  const avgX=(gs.p1.x+gs.p2.x)/2;
  bgOffset=Math.max(0,Math.min(1,(avgX-W*0.35)/(W*0.3)));
}

// ── MULTIPLAYER SYNC ─────────────────────────────────────────────
let myInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let oppInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let inputRef=null,oppInputRef=null,stateRef=null;

function setupSync(){
  // each player writes their own input
  inputRef=ref(db,`rooms/${roomCode}/input/${myKey}`);
  oppInputRef=ref(db,`rooms/${roomCode}/input/${oppKey}`);
  stateRef=ref(db,`rooms/${roomCode}/state`);

  // listen to opponent input
  onValue(oppInputRef,snap=>{
    const d=snap.val();
    if(d)oppInput={...d};
  });

  // host also listens to state written by host (for guest to read)
  if(myRole==='guest'){
    onValue(stateRef,snap=>{
      const d=snap.val();
      if(d){
        gs.p1={...gs.p1,...d.p1};
        gs.p2={...gs.p2,...d.p2};
        gs.timer=d.timer;
        gs.phase=d.phase||'fight';
        if(d.specialName&&!specialPhase){
          specialPhase={name:d.specialName,t:0};
        }
      }
    });
  }
}

function pushInput(){
  if(!inputRef)return;
  set(inputRef,myInput);
}

function pushState(){
  if(!stateRef||myRole!=='host')return;
  set(stateRef,{
    p1:{x:gs.p1.x,y:gs.p1.y,hp:gs.p1.hp,special:gs.p1.special,state:gs.p1.state,frame:gs.p1.frame,facing:gs.p1.facing,blocking:gs.p1.blocking,grounded:gs.p1.grounded},
    p2:{x:gs.p2.x,y:gs.p2.y,hp:gs.p2.hp,special:gs.p2.special,state:gs.p2.state,frame:gs.p2.frame,facing:gs.p2.facing,blocking:gs.p2.blocking,grounded:gs.p2.grounded},
    timer:gs.timer,phase:gs.phase,specialName:gs.specialName||null
  });
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInt);
  if(myRole!=='host')return;
  timerInt=setInterval(()=>{
    if(gs.phase!=='fight')return;
    gs.timer--;
    if(gs.timer<=0){clearInterval(timerInt);endGame();}
  },1000);
}

function endGame(){
  gs.phase='ko';clearInterval(timerInt);
  let winner;
  if(gs.p1.hp<=0)winner='MAURON';
  else if(gs.p2.hp<=0)winner='MACHI';
  else if(gs.p1.hp>gs.p2.hp)winner='MACHI';
  else if(gs.p2.hp>gs.p1.hp)winner='MAURON';
  else winner='EMPATE';
  const w=winner==='MACHI'?'p1':winner==='MAURON'?'p2':null;
  const l=w==='p1'?'p2':w==='p2'?'p1':null;
  if(w){gs[w].state='celeb';if(l)gs[l].state='ko';}
  setTimeout(()=>{
    hideCanvas();
    $('winTxt').textContent=winner==='EMPATE'?'¡EMPATE!':`¡GANÓ ${winner}!`;
    show('winScreen');
  },1800);
}

// ── RENDER LOOP ──────────────────────────────────────────────────
function renderLoop(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  if(gs.p1.x<gs.p2.x){drawFighter('p1');drawFighter('p2');}
  else{drawFighter('p2');drawFighter('p1');}
  if(gs.phase==='special')drawSpecialOverlay();
  drawHUD();
  drawControls();
  requestAnimationFrame(renderLoop);
}

// ── HOST GAME TICK ────────────────────────────────────────────────
function hostTick(){
  if(gs.phase==='fight'){
    applyInput('p1',myRole==='host'?myInput:oppInput);
    applyInput('p2',myRole==='guest'?myInput:oppInput);
    physicsTick();
    tickCount++;
    if(tickCount%2===0)pushState();
  } else if(gs.phase==='special'){
    physicsTick();
    if(tickCount%2===0)pushState();
  }
  tickCount++;
}

// ── KEYBOARD ─────────────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='KeyF'||e.code==='Space')myInput.attack=true;
  if(e.code==='KeyH')myInput.special=true;
  updateInputFromKeys();pushInput();
});
window.addEventListener('keyup',e=>{
  K[e.code]=false;
  if(e.code==='KeyF'||e.code==='Space')myInput.attack=false;
  if(e.code==='KeyH')myInput.special=false;
  updateInputFromKeys();pushInput();
});
function updateInputFromKeys(){
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);
  myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);
  myInput.block=!!(K['KeyG']||K['KeyL']);
  pushInput();
}

// ── TOUCH ────────────────────────────────────────────────────────
function setupTouch(){
  const s=()=>parseFloat(canvas.style.width)/W;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const p={x:t.clientX/s(),y:t.clientY/s()};
      const near=(cx,cy,r)=>Math.hypot(p.x-cx,p.y-cy)<r;
      if(near(48,H-58,40))myInput.left=true;
      if(near(112,H-58,40))myInput.right=true;
      if(near(80,H-114,40))myInput.jump=true;
      if(near(W-48,H-58,40)){myInput.attack=true;setTimeout(()=>{myInput.attack=false;pushInput();},80);}
      if(near(W-104,H-58,40))myInput.block=true;
      if(near(W-160,H-88,40)){myInput.special=true;setTimeout(()=>{myInput.special=false;pushInput();},80);}
      pushInput();
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    myInput.left=false;myInput.right=false;myInput.jump=false;myInput.block=false;
    pushInput();
  },{passive:false});
}

// ── START GAME ───────────────────────────────────────────────────
async function startGame(){
  show('waitingScreen');
  $('waitingScreen').querySelector('p').textContent='Cargando sprites...';
  await loadSprites();

  myKey=myRole==='host'?'p1':'p2';
  oppKey=myRole==='host'?'p2':'p1';

  // reset state
  gs={
    p1:{x:200,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:1,blocking:false,grounded:true},
    p2:{x:700,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:-1,blocking:false,grounded:true},
    timer:90,phase:'fight',specialName:null
  };
  fTimer={p1:0,p2:0};hitCD={p1:0,p2:0};invincible={p1:0,p2:0};
  specialPhase=null;tickCount=0;

  setupSync();
  setupTouch();

  showCanvas();
  requestAnimationFrame(renderLoop);

  if(myRole==='host'){
    startTimer();
    setInterval(hostTick,TICK);
  }
}

// ── WIN BUTTONS ──────────────────────────────────────────────────
$('btnRevanche').onclick=async()=>{
  if(myRole==='host'){
    await update(roomRef,{status:'ready',state:null});
    startGame();
  } else {
    show('waitingScreen');
    $('waitingScreen').querySelector('p').textContent='Esperando revancha...';
  }
};
$('btnLobbyBack').onclick=async()=>{
  if(roomRef)await remove(roomRef);
  roomRef=null;roomCode=null;myRole=null;
  show('lobbyScreen');
};
