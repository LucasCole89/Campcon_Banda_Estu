<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#0a0a1a;overflow:hidden;width:100vw;height:100vh;font-family:'Arial Black',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}

#loginScreen p{color:#aaa;font-size:clamp(10px,2vw,14px);margin-bottom:24px;}
.btnGoogle{display:flex;align-items:center;gap:12px;background:#fff;color:#333;font-family:'Arial Black',sans-serif;font-size:clamp(12px,2.5vw,16px);padding:10px 22px;border:none;border-radius:10px;cursor:pointer;}

#lobbyScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:7px;position:relative;}

<body>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,set,get,onValue,update,remove,off,onDisconnect}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig={apiKey:"AIzaSyBLii7JWZgNSoMZ7xLWeFRYvQ2Wx4snX-k",authDomain:"campcon-banda-estu.firebaseapp.com",databaseURL:"https://campcon-banda-estu-default-rtdb.firebaseio.com",projectId:"campcon-banda-estu",storageBucket:"campcon-banda-estu.firebasestorage.app",messagingSenderId:"790816311475",appId:"1:790816311475:web:7835a520eaa7545d2cc8c6"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getDatabase(fbApp);

const $=id=>document.getElementById(id);
const dbg=msg=>{$('dbg').textContent=msg;console.log(msg);};
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$(id).classList.remove('hidden');}
function showCanvas(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$('c').style.display='block';}
function hideCanvas(){$('c').style.display='none';}
function err(msg){$('errMsg').textContent=msg;setTimeout(()=>$('errMsg').textContent='',3000);}

// ── CONSTANTS ────────────────────────────────────────────────────
const BASE='https://lucascole89.github.io/Campcon_Banda_Estu/';
const W=900,H=500,FLOOR=H-100,GR=0.75,SPMAX=100,TICK=33;
const BASE_FH=248,FW=80;
const CHAR_SCALE={machi:1.1,mauron:1.0,yiyo:1.0,mario:0.9};
function getFH(charKey){return Math.round(BASE_FH*(CHAR_SCALE[charKey]||1));}
function pkFH(pk){return getFH(pk==='p1'?SP._p1def?.key:SP._p2def?.key);}

// ── AUDIO ────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
['touchstart','mousedown','keydown'].forEach(ev=>document.addEventListener(ev,resumeAC,{passive:true}));
function playTone(freq,type,dur,vol=0.3,delay=0){
  resumeAC();const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=type;
  o.frequency.setValueAtTime(freq,AC.currentTime+delay);
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+0.05);
}
function playNoise(dur,vol=0.2,freq=800){
  resumeAC();const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=AC.createBufferSource();src.buffer=buf;
  const bpf=AC.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=freq;bpf.Q.value=1;
  const g=AC.createGain();g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.connect(bpf);bpf.connect(g);g.connect(AC.destination);
  src.start();src.stop(AC.currentTime+dur);
}
const SFX={
  punch:()=>{resumeAC();const b=AC.createBuffer(1,AC.sampleRate*0.1,AC.sampleRate);const bd=b.getChannelData(0);for(let i=0;i<bd.length;i++)bd[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.04));const src=AC.createBufferSource();src.buffer=b;const bpf=AC.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=250;bpf.Q.value=0.8;const g=AC.createGain();g.gain.setValueAtTime(0.8,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);src.connect(bpf);bpf.connect(g);g.connect(AC.destination);src.start();src.stop(AC.currentTime+0.12);},
  block:()=>{playTone(300,'square',0.05,0.2);playTone(200,'square',0.08,0.15,0.03);},
  jump:()=>{resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(200,AC.currentTime);o.frequency.exponentialRampToValueAtTime(500,AC.currentTime+0.15);g.gain.setValueAtTime(0.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);o.start();o.stop(AC.currentTime+0.2);},
  hurt:()=>{playNoise(0.12,0.35,180);playTone(100,'sawtooth',0.12,0.25);},
  special:()=>{[100,150,200,300,450,600].forEach((f,i)=>playTone(f,'sawtooth',0.12,0.25,i*0.06));playNoise(0.3,0.3,1000);},
  ko:()=>{playNoise(0.15,0.5,150);[200,150,100,70].forEach((f,i)=>playTone(f,'sawtooth',0.15,0.3,i*0.1));},
  win:()=>{[523,659,784,1047].forEach((f,i)=>{playTone(f,'sine',0.2,0.35,i*0.15);playTone(f/2,'sine',0.2,0.15,i*0.15);});},
  plant:()=>{[80,120,160,200].forEach((f,i)=>playTone(f,'sine',0.2,0.15,i*0.08));playNoise(0.3,0.2,400);},
};
let musicNode=null;
function startMusic(){
  if(musicNode)return;resumeAC();
  const bpm=128,beat=60/bpm;let t=AC.currentTime+0.1;
  function tick(){
    const k=AC.createOscillator(),kg=AC.createGain();k.connect(kg);kg.connect(AC.destination);k.type='sine';
    k.frequency.setValueAtTime(150,t);k.frequency.exponentialRampToValueAtTime(40,t+0.1);
    kg.gain.setValueAtTime(0.5,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.2);k.start(t);k.stop(t+0.25);
    const bass=[55,55,65,55];playTone(bass[Math.floor(t*2)%4],'sawtooth',beat*0.8,0.12);
    t+=beat;musicNode=setTimeout(tick,beat*900);
  }tick();
}
function stopMusic(){if(musicNode){clearTimeout(musicNode);musicNode=null;}}

// ── AUTH ─────────────────────────────────────────────────────────
let currentUser=null,myRole=null,roomCode=null,roomRef=null,vsMode=null;
$('btnGoogle').onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>console.error(e));
$('btnLogout').onclick=()=>signOut(auth);
onAuthStateChanged(auth,user=>{
  if(user){currentUser=user;$('userName').textContent=user.displayName||user.email;$('userAvatar').src=user.photoURL||'';show('lobbyScreen');watchSalas();}
  else{currentUser=null;show('loginScreen');}
});

// ── LOBBY ────────────────────────────────────────────────────────
$('cardCPU').onclick=()=>{$('subCPU').classList.remove('hidden');$('subMulti').classList.add('hidden');$('cardCPU').classList.add('active');$('cardMulti').classList.remove('active');};
$('cardMulti').onclick=()=>{$('subMulti').classList.remove('hidden');$('subCPU').classList.add('hidden');$('cardMulti').classList.add('active');$('cardCPU').classList.remove('active');};
function watchSalas(){
  onValue(ref(db,'rooms'),snap=>{
    const list=$('salasList'),d=snap.val();
    if(!d){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    const ab=Object.entries(d).filter(([k,v])=>v.status==='waiting'&&v.host!==currentUser?.uid&&(!v.createdAt||Date.now()-v.createdAt<600000));
    if(!ab.length){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    list.innerHTML=ab.map(([code,v])=>`<div class="salaItem"><span><strong>${v.hostName||'Alguien'}</strong> — <strong>${code}</strong></span><button class="btnUnirse" onclick="joinSala('${code}')">UNIRSE</button></div>`).join('');
  });
}
window.joinSala=async code=>{$('roomCodeInput').value=code;$('btnJoin').click();};
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
$('btnCreate').onclick=async()=>{
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=genCode();roomRef=ref(db,`rooms/${roomCode}`);
    await set(roomRef,{host:currentUser.uid,hostName:currentUser.displayName,guest:null,guestName:null,status:'waiting',state:null,createdAt:Date.now(),hostChar:null,guestChar:null,guestReady:false,hostReady:false});
    onDisconnect(roomRef).remove();
    myRole='host';vsMode='online';
    $('displayCode').textContent=roomCode;$('waitMsg').textContent='Esperando al rival...';show('waitingScreen');
    onValue(roomRef,snap=>{const d=snap.val();if(!d)return;if(d.status==='ready'&&d.guest){off(roomRef);startGame();}});
  }catch(e){err('Error: '+e.message);}
};
$('btnJoin').onclick=async()=>{
  const code=$('roomCodeInput').value.trim().toUpperCase();
  if(code.length!==4){err('Código de 4 letras');return;}
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=code;roomRef=ref(db,`rooms/${roomCode}`);
    const snap=await get(roomRef);if(!snap.exists()){err('Sala no encontrada');return;}
    const d=snap.val();if(d.status!=='waiting'){err('Sala ya en juego');return;}
    await update(roomRef,{guest:currentUser.uid,guestName:currentUser.displayName,status:'ready'});
    myRole='guest';vsMode='online';startGame();
  }catch(e){err('Error: '+e.message);}
};
$('btnCPU').onclick=()=>{myRole='host';vsMode='cpu';roomCode=null;roomRef=null;startGame();};
$('btnCancel').onclick=async()=>{if(roomRef)await remove(roomRef);roomRef=null;roomCode=null;myRole=null;vsMode=null;show('lobbyScreen');};

// ── SPRITES ──────────────────────────────────────────────────────
function removeChroma(img){
  const oc=document.createElement('canvas');oc.width=img.naturalWidth;oc.height=img.naturalHeight;
  const ox=oc.getContext('2d');ox.drawImage(img,0,0);
  const d=ox.getImageData(0,0,oc.width,oc.height);
  for(let i=0;i<d.data.length;i+=4){
    const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
    if(g>150&&g-r>80&&g-b>80)d.data[i+3]=0;
    else if(b>150&&b-r>80&&b-g>50)d.data[i+3]=0;
  }
  ox.putImageData(d,0,0);return oc;
}
async function loadImg(path,noChroma=false){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>res(noChroma?img:removeChroma(img));
    img.onerror=()=>{console.warn('No cargó:',path);res(null);}
    img.src=BASE+path;
  });
}

// ── SPRITE HELPERS ───────────────────────────────────────────────
function getSP(pk){return pk==='p1'?SP._p1:SP._p2;}
function getFrames(pk,st){
  const s=getSP(pk),state=st||gs[pk].state;
  if(state==='attack'&&gs[pk]?._airAtk)return s[gs[pk]._airAtk]||s.attack||[];
  const map={idle:'idle',walk:'walk',jump:'jump',attack:'attack',special:'special',block:'block',hurt:'hurt',ko:'ko',defeated:'defeated',celeb:'celeb'};
  return s[map[state]||'idle']||[];
}

// ── DRAW ─────────────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(SP.bg){const bW=W*1.4;ctx.drawImage(SP.bg,-bgOffset*(bW-W),0,bW,FLOOR);}
  else{const g=ctx.createLinearGradient(0,0,0,FLOOR);g.addColorStop(0,'#0d1b2a');g.addColorStop(1,'#c8a060');ctx.fillStyle=g;ctx.fillRect(0,0,W,FLOOR);}
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}

function drawSpriteAt(img,x,y,fh,facing,tint,wiggle){
  if(!img)return;
  const dw=img.width*(fh/img.height);
  const wx=wiggle?Math.sin(Date.now()*0.05)*5:0;
  const wy=wiggle?Math.abs(Math.sin(Date.now()*0.035))*-8:0;
  ctx.save();
  if(facing<0){ctx.translate(x+dw/2+wx,y-fh+wy);ctx.scale(-1,1);}
  else ctx.translate(x-dw/2+wx,y-fh+wy);
  if(tint){const oc=document.createElement('canvas');oc.width=dw;oc.height=fh;const ox=oc.getContext('2d');ox.drawImage(img,0,0,dw,fh);ox.globalCompositeOperation='source-atop';ox.fillStyle=tint;ox.fillRect(0,0,dw,fh);ctx.drawImage(oc,0,0,dw,fh);}
  else ctx.drawImage(img,0,0,dw,fh);
  ctx.restore();
}

function drawFighter(pk){
  const f=gs[pk],fh=pkFH(pk);
  const frames=getFrames(pk);
  const img=frames[Math.min(f.frame,Math.max(0,frames.length-1))];
  const isMauronPunch=getSP(pk)===SP.mauron&&f.state==='attack'&&!f._airAtk;
  const ox=isMauronPunch?(f.facing>0?20:-20):0;
  drawSpriteAt(img,f.x+ox,f.y,fh,f.facing,f.state==='hurt'?'rgba(255,0,0,0.5)':null,f.wiggle>0);
  if(f.blocking){
    ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#4af';
    ctx.beginPath();ctx.ellipse(f.x+(f.facing>0?30:-30),f.y-fh/2,40,75,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
}

    const fw=bW*Math.max(0,Math.min(1,p1));ctx.fillStyle='#e63946';ctx.fillRect(right?x+bW-fw:x,y1,fw,bH);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(x,y1,bW,bH);
    ctx.fillStyle='#111';ctx.fillRect(x,y2,bW,bH);
    const fw2=bW*Math.max(0,Math.min(1,p2));ctx.fillStyle='#c0392b';ctx.fillRect(right?x+bW-fw2:x,y2,fw2,bH);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(x,y2,bW,bH);
  };
  const spBar=(x,pct,col,right)=>{
    ctx.fillStyle='#111';ctx.fillRect(x,y3,bW,spH);
    const fw=bW*Math.max(0,Math.min(1,pct));ctx.fillStyle=col;ctx.fillRect(right?x+bW-fw:x,y3,fw,spH);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y3,bW,spH);
    if(pct>=1){ctx.save();ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.008);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y3,bW,spH);ctx.restore();}
  };
  const p1def=SP._p1def,p2def=SP._p2def;
  twoBar(10,gs.p1.hp/100,gs.p1.hp2/100,false);spBar(10,gs.p1.special/SPMAX,p1def?.color||'#FFD700',false);
  ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='left';ctx.fillText(p1def?.name||'P1',12,y1+11);
  twoBar(W-10-bW,gs.p2.hp/100,gs.p2.hp2/100,true);spBar(W-10-bW,gs.p2.special/SPMAX,p2def?.color||'#00FF7F',true);
  ctx.textAlign='right';ctx.fillText(p2def?.name||'P2',W-12,y1+11);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(W/2-26,8,52,26,6);ctx.fill();
  ctx.fillStyle=gs.timer<=10?'#ff4444':'#fff';ctx.font='bold 18px Arial Black';ctx.textAlign='center';ctx.fillText(Math.ceil(gs.timer),W/2,26);
  for(let i=0;i<2;i++){ctx.fillStyle=wins.p1>i?(p1def?.color||'#FFD700'):'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(W/2-22+i*14,y3+spH+8,4,0,Math.PI*2);ctx.fill();}
  for(let i=0;i<2;i++){ctx.fillStyle=wins.p2>i?(p2def?.color||'#00FF7F'):'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(W/2+8+i*14,y3+spH+8,4,0,Math.PI*2);ctx.fill();}
  if(gs.p1.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle=p1def?.color||'#FFD700';ctx.font='bold 8px Arial';ctx.textAlign='left';ctx.fillText('⚡LISTO!',12,y3+spH+10);ctx.restore();}
  if(gs.p2.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle=p2def?.color||'#00FF7F';ctx.font='bold 8px Arial';ctx.textAlign='right';ctx.fillText('⚡LISTO!',W-12,y3+spH+10);ctx.restore();}
  if(specialPhase){
    const spDef=specialPhase.pk==='p1'?p1def:p2def;
    const col=spDef?.color||'#FFD700';
    ctx.fillStyle=col;ctx.font='bold 12px Arial Black';ctx.textAlign='center';
    ctx.shadowColor=col;ctx.shadowBlur=8;
    ctx.fillText((spDef?.specialName||'SPECIAL').replace('\n',' '),W/2,H-10);

  }
  if(roundBanner){
    roundBanner.t++;
    const alpha=roundBanner.t<20?roundBanner.t/20:roundBanner.t>60?1-(roundBanner.t-60)/20:1;

// ── SPECIAL ──────────────────────────────────────────────────────
function applySpecialDamage(targetKey,launcherKey,s){
  const target=gs[targetKey];if(target.state==='ko')return;
  s.oppHit=true;s.oppWiggle=60;
  const lKey=(launcherKey==='p1'?SP._p1def:SP._p2def)?.key;
  if(lKey==='machi'){SFX.hurt();SFX.special();}else{SFX.plant();}
  target.state='hurt';target.frame=0;target.wiggle=60;inv[targetKey]=25;
  if(lKey!=='machi'&&target.grounded){target.vy=-6;target.grounded=false;}
  if(!target.blocking){
    target.hp=Math.max(0,target.hp-35);
    if(target.hp<=0&&target.hp2<=0){SFX.ko();setTimeout(()=>startKOSequence(targetKey,launcherKey),600);}
    else if(target.hp<=0){target.hp=target.hp2;target.hp2=0;}
  } else {target.hp=Math.max(0,target.hp-8);SFX.block();}
}

function drawSpecial(){
  const s=specialPhase;if(!s)return;
  const{pk,ok}=s;
  const launcherKey=(pk==='p1'?SP._p1def:SP._p2def)?.key;
  const spSP=getSP(pk);
  if(!s.frozenOpp)s.frozenOpp={...gs[ok]};
  const frozenOpp=s.frozenOpp;
  const fhOk=pkFH(ok);
  drawBg();
  // dibujar oponente congelado
  function drawFrz(fp,fh){
    const frames=getFrames(ok,fp.state);
    const img=frames[Math.min(fp.frame,Math.max(0,frames.length-1))];
    if(!img)return;const dw=img.width*(fh/img.height);
    const tint=s.oppHit?'rgba(255,0,0,0.55)':null;
    const wx=s.oppWiggle>0?Math.sin(Date.now()*0.05)*5:0;
    ctx.save();if(fp.facing<0){ctx.translate(fp.x+dw/2+wx,fp.y-fh);ctx.scale(-1,1);}
    else ctx.translate(fp.x-dw/2+wx,fp.y-fh);
    if(tint){const oc=document.createElement('canvas');oc.width=dw;oc.height=fh;const ox=oc.getContext('2d');ox.drawImage(img,0,0,dw,fh);ox.globalCompositeOperation='source-atop';ox.fillStyle=tint;ox.fillRect(0,0,dw,fh);ctx.drawImage(oc,0,0);}
    else ctx.drawImage(img,0,0,dw,fh);
    ctx.restore();
  }
  drawFrz(frozenOpp,fhOk);
  if(s.oppWiggle>0)s.oppWiggle--;
  const p=gs[pk],fh=pkFH(pk);

  if(launcherKey==='machi'){
    const atkFrames=spSP?.special||[];
    const fi=Math.min(Math.floor(s.t/3),atkFrames.length-1);
    const af=atkFrames[fi];
    if(af){const dh=fh,dw=af.width*(dh/af.height)*1.12,bodyW=dw*0.25;
      ctx.save();if(p.facing>0){ctx.translate(p.x-bodyW,p.y-dh);}else{ctx.translate(p.x+bodyW,p.y-dh);ctx.scale(-1,1);}
      ctx.drawImage(af,0,0,dw,dh);ctx.restore();}
    const isLast=fi>=atkFrames.length-1;
    if(!s.holdStarted&&isLast){s.holdStarted=true;s.holdT=0;}
    if(s.holdStarted)s.holdT++;
    if(fi>=4&&!s.damageDealt){
      s.damageDealt=true;
      const champTip=p.facing>0?p.x+280:p.x-280;
      const oppX=frozenOpp.x;
      const inRange=p.facing>0?(oppX>p.x&&oppX<champTip+80):(oppX<p.x&&oppX>champTip-80);
      if(inRange)applySpecialDamage(ok,pk,s);
    }

  } else if(launcherKey==='mauron'){
    const spF=spSP?.special||[];
    if(s.t<35){
      const fi=Math.min(Math.floor(s.t/9),spF.length-1);const sf=spF[fi];
      if(sf){const dw=sf.width*(fh/sf.height);ctx.save();if(p.facing<0){ctx.translate(p.x+dw/2,p.y-fh);ctx.scale(-1,1);}else ctx.translate(p.x-dw/2,p.y-fh);ctx.drawImage(sf,0,0,dw,fh);ctx.restore();}
    } else {
      const lastSF=spF[spF.length-1];
      if(lastSF){const dw=lastSF.width*(fh/lastSF.height);ctx.save();if(p.facing<0){ctx.translate(p.x+dw/2,p.y-fh);ctx.scale(-1,1);}else ctx.translate(p.x-dw/2,p.y-fh);ctx.drawImage(lastSF,0,0,dw,fh);ctx.restore();}
      const plants=spSP?.plants||[];
      const fi=Math.min(Math.floor((s.t-35)/4),plants.length-1);const pf=plants[fi];
      if(pf){const ph=fh*0.85,pw=pf.width*(ph/pf.height);ctx.save();ctx.translate(s.plantX,FLOOR);ctx.drawImage(pf,-pw/2,-ph,pw,ph);ctx.restore();}
      const isLast=fi>=plants.length-1;
      if(!s.holdStarted&&isLast){s.holdStarted=true;s.holdT=0;}
      if(s.holdStarted)s.holdT++;
      if(s.holdStarted&&s.holdT>=6&&!s.damageDealt){s.damageDealt=true;if(Math.abs(s.plantX-frozenOpp.x)<FW*1.5)applySpecialDamage(ok,pk,s);}
    }

  } else if(launcherKey==='yiyo'){
    const spF=spSP?.special||[];const invocDur=spF.length*10;
    if(s.t<invocDur){
      const fi=Math.min(Math.floor(s.t/10),spF.length-1);const sf=spF[fi];
      if(sf){const dw=sf.width*(fh/sf.height);ctx.save();if(p.facing<0){ctx.translate(p.x+dw/2,p.y-fh);ctx.scale(-1,1);}else ctx.translate(p.x-dw/2,p.y-fh);ctx.drawImage(sf,0,0,dw,fh);ctx.restore();}
    } else {
      if(s.catX===undefined){s.catX=-80;s.catFrameT=0;s.catFi=0;}
      s.catX+=5;s.catFrameT++;
      if(s.catFrameT>=60){s.catFrameT=0;s.catFi=(s.catFi+1)%3;}
      const cats=spSP?.specialModule||[];const cf=cats[s.catFi];
      if(cf){const ch=fh*0.75,cw=cf.width*(ch/cf.height);ctx.save();ctx.translate(s.catX,FLOOR);ctx.drawImage(cf,-cw/2,-ch,cw,ch);ctx.restore();}
      if(!s.damageDealt&&Math.abs(s.catX-frozenOpp.x)<FW*1.4){s.damageDealt=true;applySpecialDamage(ok,pk,s);}
      if(s.catX>W+100)s.holdStarted=true;
    }

  } else if(launcherKey==='mario'){
    const spF=spSP?.special||[];const invocDur=spF.length*10;
    if(s.t<invocDur){
      const fi=Math.min(Math.floor(s.t/10),spF.length-1);const sf=spF[fi];
      if(sf){const dw=sf.width*(fh/sf.height);ctx.save();if(p.facing<0){ctx.translate(p.x+dw/2,p.y-fh);ctx.scale(-1,1);}else ctx.translate(p.x-dw/2,p.y-fh);ctx.drawImage(sf,0,0,dw,fh);ctx.restore();}
    } else {
      if(!s.alfredInit){s.alfredInit=true;s.alfredX=-80;s.alfredPhase='enter';s.alfredT=0;}
      const alfred=spSP?.specialModule||[];const ah=fh*0.95;
      if(s.alfredPhase==='enter'){
        s.alfredX+=6;const af=alfred[0];
        if(af){const aw=af.width*(ah/af.height);ctx.save();ctx.translate(s.alfredX,FLOOR);ctx.drawImage(af,-aw/2,-ah,aw,ah);ctx.restore();}
        if(s.alfredX>=frozenOpp.x-FW*0.8){s.alfredPhase='punch05';s.alfredT=0;}
      } else if(s.alfredPhase==='punch05'){
        s.alfredT++;const af=alfred[1];
        if(af){const aw=af.width*(ah/af.height);ctx.save();ctx.translate(s.alfredX,FLOOR);ctx.drawImage(af,-aw/2,-ah,aw,ah);ctx.restore();}
        if(s.alfredT>=18){s.alfredPhase='punch06';s.alfredT=0;if(!s.damageDealt){s.damageDealt=true;applySpecialDamage(ok,pk,s);}}
      } else if(s.alfredPhase==='punch06'){
        s.alfredT++;const af=alfred[2];
        if(af){const aw=af.width*(ah/af.height);ctx.save();ctx.translate(s.alfredX,FLOOR);ctx.drawImage(af,-aw/2,-ah,aw,ah);ctx.restore();}
        if(s.alfredT>=50){s.alfredPhase='exit';s.alfredT=0;}
      } else if(s.alfredPhase==='exit'){
        s.alfredX-=6;const af=alfred[3];
        if(af){const aw=af.width*(ah/af.height);ctx.save();ctx.translate(s.alfredX,FLOOR);ctx.drawImage(af,-aw/2,-ah,aw,ah);ctx.restore();}
        if(s.alfredX<-100)s.holdStarted=true;
      }
    }
  }

  s.t++;
  const done=s.holdStarted||(s.t>=90&&!s.alfredInit&&s.catX===undefined);
  if(done){
    specialPhase=null;
    if(gs.phase!=='ko'){
      gs.phase='fight';gs.specialName=null;
      gs[pk].state='idle';gs[pk].frame=0;
      if(gs[ok].state!=='ko'){gs[ok].state='idle';gs[ok].frame=0;inv[ok]=0;}
    }
  }
}

// ── KO ───────────────────────────────────────────────────────────
function startKOSequence(loserKey,winnerKey){
  if(gs.phase==='ko')return;
  SFX.ko();
  const loser=gs[loserKey],dir=loser.x<gs[winnerKey].x?-1:1;
  const wdef=winnerKey==='p1'?SP._p1def:SP._p2def;
  const wuser=vsMode==='cpu'?(winnerKey==='p1'?(currentUser?.displayName||'VOS'):'CPU'):(winnerKey==='p1'?currentUser?.displayName||'P1':'RIVAL');
  koSeq={loser:loserKey,winner:winnerKey,t:0,phase:'flyback',vx:dir*8,vy:-10,
         celebFrame:0,celebFrameT:0,idleT:0,
         winnerName:`${wdef?.name||winnerKey.toUpperCase()}\n(${wuser})`};
  gs[loserKey].state='ko';gs[winnerKey].state='idle';gs[winnerKey].frame=0;
  gs.phase='ko';clearInterval(timerInt);
  wins[winnerKey]++;koSeq.matchWin=wins[winnerKey]>=2;
}

function updateKOSeq(){
  if(!koSeq)return;
  const s=koSeq,loser=gs[s.loser];
  if(s.phase==='flyback'){
    s.vx*=0.88;s.vy+=GR;loser.x+=s.vx;loser.y+=s.vy;
    if(loser.y>=FLOOR){loser.y=FLOOR;s.phase='floor';loser.state='defeated';loser.frame=0;s.t=0;}
  } else if(s.phase==='floor'){
    s.t++;s.idleT++;
    if(s.idleT>40&&gs[s.winner].state==='idle'){gs[s.winner].state='celeb';gs[s.winner].frame=0;}
    if(s.t>60){
      if(s.matchWin){s.phase='celeb';s.t=0;}
      else{currentRound++;roundBanner={text:'ROUND '+currentRound,t:0};koSeq=null;setTimeout(()=>{initRound();startTimer();},1500);}
    }
  } else if(s.phase==='celeb'){
    s.t++;
    const wdef=s.winner==='p1'?SP._p1def:SP._p2def;
    const useSpecialCeleb=wdef?.key==='yiyo'||wdef?.key==='mario';
    const isMario=wdef?.key==='mario';
    // timing: frames 0,1 → 60 ticks cada uno (solo una vez); frames 2,3 → loop a 35 ticks
    const frameDur=f=>f<=1?60:35;
    s.celebFrameT++;
    if(s.celebFrameT>=frameDur(s.celebFrame)){
      s.celebFrameT=0;
      if(useSpecialCeleb){
        if(s.celebFrame<2)s.celebFrame++;       // avanzar 0→1→2 una vez
        else s.celebFrame=s.celebFrame===2?3:2; // loop 2↔3
      } else {
        const cf=getFrames(s.winner,'celeb');
        s.celebFrame=(s.celebFrame+1)%cf.length;
      }
    }
    gs[s.winner].frame=s.celebFrame;
    if(isMario)gs[s.winner].wiggle=2; // vibración continua
    if(s.t>240){
      s.phase='done';SFX.win();stopMusic();
      setTimeout(()=>{hideCanvas();$('winTxt').textContent=s.winnerName+' WINS!';show('winScreen');},500);
    }
  }
}

function drawKOOverlay(){
  if(!koSeq||koSeq.phase==='done')return;
  const s=koSeq,loser=gs[s.loser],fh=pkFH(s.loser);
  const state=s.phase==='flyback'?'ko':'defeated';
  const img=(getFrames(s.loser,state))[0];
  if(img)drawSpriteAt(img,loser.x,loser.y,fh,loser.facing,null,false);
  if(s.phase==='celeb'){
    const alpha=Math.min(1,s.t/30);
    const lines=s.winnerName.split('\n');
    ctx.save();ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,H*0.04,W,H*0.16);
    ctx.textAlign='center';ctx.shadowColor='#FF6600';ctx.shadowBlur=30;
    ctx.fillStyle='#FFD700';ctx.font='bold '+Math.floor(W*0.065)+'px Arial Black';
    ctx.fillText(lines[0]+' WINS!',W/2,H*0.14);
    if(lines[1]){ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold '+Math.floor(W*0.025)+'px Arial';ctx.fillText(lines[1],W/2,H*0.20);}
    ctx.restore();
  }
}

// ── PHYSICS ──────────────────────────────────────────────────────
function physicsTick(){
  ['p1','p2'].forEach(pk=>{
    const p=gs[pk];if(['ko','defeated'].includes(p.state))return;
    if(inv[pk]>0)inv[pk]--;if(hitCD[pk]>0)hitCD[pk]--;
    if(!p.grounded){p.vy+=GR;p.y+=p.vy;}
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.grounded=true;if(p.state==='jump')p.state='idle';}
    if(p.wiggle>0)p.wiggle--;
    fTimer[pk]++;
    const fr=getFrames(pk),nf=fr.length||1;
    const spd=p.state==='attack'?(nf<=1?8:5):p.state==='walk'?5:p.state==='celeb'?3:8;
    if(fTimer[pk]>=spd){fTimer[pk]=0;p.frame++;}
    if(p.frame>=nf){
      if(!['ko','hurt','defeated'].includes(p.state))p.frame=0;
      else p.frame=nf-1;
      if(p.state==='attack'){p.state='idle';p.frame=0;p._attackHit=false;p._airAtk=null;}
      if(p.state==='hurt'){p.state='idle';p.frame=0;}
    }
  });
  if(gs.p1.grounded&&gs.p2.grounded){
    const md=FW*1.1;
    if(Math.abs(gs.p1.x-gs.p2.x)<md){
      const push=(md-Math.abs(gs.p1.x-gs.p2.x))/2+1;
      if(gs.p1.x<=gs.p2.x){gs.p1.x-=push;gs.p2.x+=push;}else{gs.p1.x+=push;gs.p2.x-=push;}
    }
  }
  gs.p1.x=Math.max(60,Math.min(W-60,gs.p1.x));gs.p2.x=Math.max(60,Math.min(W-60,gs.p2.x));
  if(!['attack','special','hurt','ko','block','defeated'].includes(gs.p1.state))gs.p1.facing=gs.p2.x>gs.p1.x?1:-1;
  if(!['attack','special','hurt','ko','block','defeated'].includes(gs.p2.state))gs.p2.facing=gs.p1.x>gs.p2.x?1:-1;
  bgOffset=Math.max(0,Math.min(1,((gs.p1.x+gs.p2.x)/2-W*0.35)/(W*0.3)));
}

// ── INPUT ────────────────────────────────────────────────────────
function applyInput(pk,inp){
  const p=gs[pk];if(['ko','defeated','special'].includes(p.state))return;
  const ok=pk==='p1'?'p2':'p1',opp=gs[ok];
  p.blocking=!!(inp.block&&p.grounded);
  if(p.blocking&&p.state!=='attack'){p.state='block';return;}
  else if(!p.blocking&&p.state==='block')p.state='idle';
  if(!p._dashTimer)p._dashTimer=0;if(!p._lastDir)p._lastDir=0;if(!p._dashing)p._dashing=false;if(!p._dashT)p._dashT=0;
  const curDir=inp.left?-1:inp.right?1:0;
  if(curDir!==0&&curDir===p._lastDir&&p._dashTimer>0&&p._dashTimer<15){p._dashing=true;p._dashT=18;}
  if(curDir!==0)p._dashTimer=15;else if(p._dashTimer>0)p._dashTimer--;
  p._lastDir=curDir;if(p._dashT>0)p._dashT--;else p._dashing=false;
  const speed=p._dashing?8.5:4.5;
  if(inp.left){p.x-=speed;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(inp.right){p.x+=speed;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(p.state==='walk')p.state='idle';
  if(!['attack','hurt','ko','block','defeated'].includes(p.state))p.facing=opp.x>p.x?1:-1;
  if(inp.jump&&p.grounded&&!['attack','hurt','ko','defeated'].includes(p.state)){p.vy=-14;p.grounded=false;p.state='jump';p.frame=0;SFX.jump();}
  if(inp.attack&&p.state!=='attack'&&!['hurt','ko','defeated'].includes(p.state)&&hitCD[pk]===0){
    p.state='attack';p.frame=0;p._attackHit=false;
    p._airAtk=!p.grounded?(Math.random()<0.5?'jumpKick':'jumpPunch'):null;SFX.punch();
  }
  const atkF=p._airAtk?getFrames(pk,p._airAtk):getFrames(pk,'attack');
  const hitFrom=atkF.length<=1?0:1;
  if(p.state==='attack'&&p.frame>=hitFrom&&!p._attackHit&&fTimer[pk]>=2){
    if(Math.abs(p.x-opp.x)<=(p._airAtk?160:130)){
      p._attackHit=true;
      if(!opp.blocking&&inv[ok]===0){
        const dmg=p._airAtk?14:10;
        opp.hp=Math.max(0,opp.hp-dmg);opp.state='hurt';opp.frame=0;opp.wiggle=18;inv[ok]=15;
        p.special=Math.min(SPMAX,p.special+15);setTimeout(()=>SFX.hurt(),60);
        if(opp.hp<=0&&opp.hp2<=0)startKOSequence(ok,pk);
        else if(opp.hp<=0){opp.hp=opp.hp2;opp.hp2=0;}
      } else if(opp.blocking){opp.hp=Math.max(0,opp.hp-2);p.special=Math.min(SPMAX,p.special+6);SFX.block();}
      hitCD[pk]=20;
    }
  }
  if(inp.special&&p.special>=SPMAX&&!['hurt','ko','defeated','special'].includes(p.state)){
    p.special=0;p.state='special';p.frame=0;gs.phase='special';
    specialPhase={pk,ok,t:0,damageDealt:false,plantX:p.x+(p.facing>0?220:-220),frozenOpp:null,oppHit:false,oppWiggle:0,holdStarted:false,holdT:0,catX:undefined,alfredInit:false};
    SFX.special();
  }
}

// ── CPU AI ───────────────────────────────────────────────────────
let cpuTick=0;
const cpuInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
function updateCPU(){
  const cpu=gs.p2,pl=gs.p1;if(['ko','defeated'].includes(cpu.state))return;
  cpuTick++;const dist=Math.abs(cpu.x-pl.x);
  Object.keys(cpuInput).forEach(k=>cpuInput[k]=false);
  if(dist>140){cpuInput.left=cpu.x>pl.x;cpuInput.right=cpu.x<pl.x;}
  if(dist<130&&cpuTick%30===0){if(cpu.special>=SPMAX&&Math.random()<0.2)cpuInput.special=true;else cpuInput.attack=true;}
  if(Math.random()<0.006&&cpu.grounded)cpuInput.jump=true;
  if(pl.state==='attack'&&dist<150&&Math.random()<0.3)cpuInput.block=true;
}

// ── HOST TICK ────────────────────────────────────────────────────
function hostTick(){
  if(!gs||gs.phase==='countdown')return;
  if(koSeq&&koSeq.phase!=='done'){updateKOSeq();return;}
  if(gs.phase==='fight'||gs.phase==='special'){
    if(vsMode==='cpu')updateCPU();
    applyInput('p1',vsMode==='online'?(myRole==='host'?myInput:oppInput):myInput);
    applyInput('p2',vsMode==='online'?(myRole==='guest'?myInput:oppInput):cpuInput);
    physicsTick();
    if(vsMode==='online'&&tickN%2===0)pushState();
  }
  tickN++;
}

// ── ONLINE SYNC ──────────────────────────────────────────────────
function setupSync(){
  if(vsMode!=='online')return;
  inputRef=ref(db,`rooms/${roomCode}/input/${myKey}`);
  oppInputRef=ref(db,`rooms/${roomCode}/input/${oppKey}`);
  stateRef=ref(db,`rooms/${roomCode}/state`);
  onValue(oppInputRef,snap=>{const d=snap.val();if(d)Object.assign(oppInput,d);});
  if(myRole==='guest'){
    onValue(stateRef,snap=>{
      const d=snap.val();if(!d)return;
      Object.assign(gs.p1,d.p1);Object.assign(gs.p2,d.p2);
      gs.timer=d.timer;gs.phase=d.phase||'fight';
      if(d.spPk&&!specialPhase)specialPhase={pk:d.spPk,ok:d.spOk,t:0,damageDealt:false,plantX:d.plantX||null,frozenOpp:null,oppHit:false,oppWiggle:0,holdStarted:false,holdT:0,catX:undefined,alfredInit:false};
    });
  }
}
function pushInput(){if(inputRef&&vsMode==='online')set(inputRef,{...myInput});}
function pushState(){
  if(!stateRef||myRole!=='host'||vsMode!=='online')return;
  set(stateRef,{
    p1:{x:gs.p1.x,y:gs.p1.y,hp:gs.p1.hp,hp2:gs.p1.hp2,special:gs.p1.special,state:gs.p1.state,frame:gs.p1.frame,facing:gs.p1.facing,blocking:gs.p1.blocking,grounded:gs.p1.grounded},
    p2:{x:gs.p2.x,y:gs.p2.y,hp:gs.p2.hp,hp2:gs.p2.hp2,special:gs.p2.special,state:gs.p2.state,frame:gs.p2.frame,facing:gs.p2.facing,blocking:gs.p2.blocking,grounded:gs.p2.grounded},
    timer:gs.timer,phase:gs.phase,spPk:specialPhase?.pk||null,spOk:specialPhase?.ok||null,plantX:specialPhase?.plantX||null
  });
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(gs.phase!=='fight')return;gs.timer--;
    if(gs.timer<=0){
      clearInterval(timerInt);
      const t1=gs.p1.hp+gs.p1.hp2,t2=gs.p2.hp+gs.p2.hp2;
      if(t1>t2)startKOSequence('p2','p1');
      else if(t2>t1)startKOSequence('p1','p2');
      else{wins.p1++;wins.p2++;gs.phase='ko';roundBanner={text:'EMPATE',t:0};
        setTimeout(()=>{if(wins.p1>=2&&wins.p2>=2){hideCanvas();$('winTxt').textContent='¡EMPATE!';show('winScreen');}
          else{currentRound++;initRound();startCountdown();}},1500);}
    }
  },1000);
}

// ── RENDER LOOP ──────────────────────────────────────────────────
function renderLoop(){
  ctx.clearRect(0,0,W,H);
  if(gs.phase==='special'&&specialPhase){
    drawSpecial();
  } else {
    drawBg();
    if(gs.p1.x<gs.p2.x){drawFighter('p1');drawFighter('p2');}else{drawFighter('p2');drawFighter('p1');}
    if(koSeq&&koSeq.phase!=='done')drawKOOverlay();
  }
  drawHUD();drawControls();
  if(countdown)drawCountdown();
  requestAnimationFrame(renderLoop);
}

// ── CHAR SELECT ──────────────────────────────────────────────────
// Variables de selección — TODAS en scope de módulo
let myCharChoice=null;
let oppCharChoice=null;
let selPhase='player'; // 'player' | 'opponent'
let selAnimId=null,selIdleFrame=0,selIdleTimer=0;

function buildCharGrid(){
  const grid=$('charGrid');grid.innerHTML='';
  CHARS.forEach((ch,i)=>{
    const card=document.createElement('div');
    card.className='charCard';card.id='selCard'+i;
    card.innerHTML=`<canvas id="selCanvas${i}" width="110" height="165"></canvas>
      <div class="charName" style="color:${ch.color}">${ch.name}</div>
      <div class="charSpecial">${ch.specialName.replace('\n',' ')}</div>`;
    card.addEventListener('click',()=>selectChar(i));
    grid.appendChild(card);
  });
}

function resetCards(){
  CHARS.forEach((_,i)=>{
    const c=$('selCard'+i);if(!c)return;
    c.classList.remove('sel-p1','sel-p2');
    c.style.opacity='1';c.style.pointerEvents='auto';
  });
}

function showSelectScreen(){
  myCharChoice=null;oppCharChoice=null;selPhase='player';
  $('btnFight').style.display='none';$('btnFight').disabled=false;
  $('selMsg').textContent=vsMode==='cpu'?'Elegí TU personaje':'Tocá el personaje que querés usar';
  buildCharGrid();show('selectScreen');

  if(vsMode==='online'&&myRole==='guest'){
    CHARS.forEach((_,i)=>{const c=$('selCard'+i);if(c){c.style.opacity='0.35';c.style.pointerEvents='none';}});
    $('selMsg').textContent='Esperando que el rival elija...';
    const hcRef=ref(db,`rooms/${roomCode}/hostChar`);
    onValue(hcRef,snap=>{
      const hc=snap.val();if(!hc)return;off(hcRef);
      CHARS.forEach((c,i)=>{const card=$('selCard'+i);if(!card)return;
        if(c.key!==hc){card.style.opacity='1';card.style.pointerEvents='auto';}
        else{card.style.opacity='0.25';card.style.pointerEvents='none';}});
      $('selMsg').textContent='¡Elegí tu personaje!';
    });
  }

  if(selAnimId)cancelAnimationFrame(selAnimId);
  selIdleFrame=0;selIdleTimer=0;
  function animSel(){
    selIdleTimer++;if(selIdleTimer>8){selIdleTimer=0;selIdleFrame++;}
    CHARS.forEach((ch,i)=>{
      const sc=$('selCanvas'+i);if(!sc)return;
      const sx=sc.getContext('2d');sx.clearRect(0,0,110,165);
      const frames=SP[ch.key]?.idle||[];if(!frames.length)return;
      const img=frames[selIdleFrame%frames.length];if(!img)return;
      const scale=CHAR_SCALE[ch.key]||1,h=165*scale,w=img.width*(h/img.height);
      sx.drawImage(img,(110-w)/2,165-h,w,h);
    });
    selAnimId=requestAnimationFrame(animSel);
  }
  selAnimId=requestAnimationFrame(animSel);
}

function selectChar(idx){
  if(vsMode==='cpu'){
    if(selPhase==='player'){
      if(myCharChoice)return;
      myCharChoice=CHARS[idx].key;
      $('selCard'+idx).classList.add('sel-p1');
      $('selMsg').textContent='Ahora elegí el RIVAL 👇';
      selPhase='opponent';
      // reactivar todas para elegir rival
      CHARS.forEach((_,i)=>{const c=$('selCard'+i);if(c){c.style.opacity='1';c.style.pointerEvents='auto';}});
    } else if(selPhase==='opponent'){
      if(oppCharChoice)return;
      oppCharChoice=CHARS[idx].key;
      $('selCard'+idx).classList.add('sel-p2');
      // bloquear todo
      CHARS.forEach((_,i)=>{const c=$('selCard'+i);if(!c)return;
        c.style.pointerEvents='none';
        if(!c.classList.contains('sel-p1')&&!c.classList.contains('sel-p2'))c.style.opacity='0.4';});
      const p1name=CHARS.find(c=>c.key===myCharChoice)?.name||'?';
      const p2name=CHARS[idx].name;
      $('selMsg').textContent=`${p1name} vs ${p2name} — ¿Arrancamos?`;
      $('btnFight').style.display='block';$('btnFight').disabled=false;
    }
    return;
  }
  // online
  if(myCharChoice)return;
  myCharChoice=CHARS[idx].key;
  CHARS.forEach((_,i)=>{const c=$('selCard'+i);if(!c)return;
    c.classList.remove('sel-p1','sel-p2');
    if(i===idx)c.classList.add(myRole==='host'?'sel-p1':'sel-p2');
    else{c.style.opacity='0.4';c.style.pointerEvents='none';}});
  if(myRole==='host'){
    update(roomRef,{hostChar:myCharChoice,guestReady:false});
    $('selMsg').textContent='Esperando que el rival elija...';
    const grRef=ref(db,`rooms/${roomCode}/guestReady`);
    onValue(grRef,snap=>{if(snap.val()!==true)return;off(grRef);
      $('selMsg').textContent='¡El rival está listo!';
      $('btnFight').style.display='block';$('btnFight').disabled=false;});
  } else {
    update(roomRef,{guestChar:myCharChoice,guestReady:true});
    $('selMsg').textContent='Esperando que el host confirme...';
    const hrRef=ref(db,`rooms/${roomCode}/hostReady`);
    onValue(hrRef,snap=>{if(snap.val()!==true)return;off(hrRef);
      $('selMsg').textContent='¡El host está listo!';
      $('btnFight').style.display='block';$('btnFight').disabled=false;});
  }
}

$('btnFight').onclick=async function(){
  // validar que ambas elecciones estén completas
  if(vsMode==='cpu'){if(!myCharChoice||!oppCharChoice){dbg('Faltan elecciones');return;}}
  else{if(!myCharChoice){dbg('Sin personaje');return;}}
  if(selAnimId){cancelAnimationFrame(selAnimId);selAnimId=null;}
  $('btnFight').disabled=true;

  let p1Key,p2Key;
  if(vsMode==='cpu'){
    p1Key=myCharChoice;p2Key=oppCharChoice;
  } else if(myRole==='host'){
    const snap=await get(ref(db,`rooms/${roomCode}/guestChar`));
    p1Key=myCharChoice;p2Key=snap.val()||CHARS.find(c=>c.key!==myCharChoice).key;
    await update(roomRef,{hostReady:true});
  } else {
    const snap=await get(ref(db,`rooms/${roomCode}/hostChar`));
    // guest es p2 localmente pero p1 en su pantalla
    p2Key=myCharChoice;p1Key=snap.val()||CHARS.find(c=>c.key!==myCharChoice).key;
  }

  SP._p1=SP[p1Key];SP._p1def=CHARS.find(c=>c.key===p1Key);
  SP._p2=SP[p2Key];SP._p2def=CHARS.find(c=>c.key===p2Key);

  // guest: invertir p1/p2 para que el guest vea su personaje a la izquierda
  if(myRole==='guest'){[SP._p1,SP._p2]=[SP._p2,SP._p1];[SP._p1def,SP._p2def]=[SP._p2def,SP._p1def];}

  dbg(`LANZANDO p1:${SP._p1def?.name} p2:${SP._p2def?.name} | sprites:${!!SP._p1&&!!SP._p2}`);
  if(!SP._p1||!SP._p2){dbg('ERROR sprites nulos');$('btnFight').disabled=false;return;}
  launchFight();
};

function launchFight(){
  initGS();setupSync();setupTouch();
  showCanvas();startMusic();
  requestAnimationFrame(renderLoop);
  startCountdown();
}

// ── COUNTDOWN ────────────────────────────────────────────────────
function startCountdown(){
  gs.phase='countdown';countdown={n:3,t:0};
  if(myRole==='host'||vsMode==='cpu'){
    if(window._hostInterval)clearInterval(window._hostInterval);
    window._hostInterval=setInterval(hostTick,TICK);
  }
  let n=3;
  if(window._cdInt)clearInterval(window._cdInt);
  window._cdInt=setInterval(()=>{
    n--;
    if(n<0){clearInterval(window._cdInt);window._cdInt=null;countdown=null;gs.phase='fight';
      if(myRole==='host'||vsMode==='cpu')startTimer();dbg('¡FIGHT!');return;}
    countdown={n,t:0};resumeAC();playTone(n===0?1047:660,'sine',0.15,0.4);
  },1000);
}

// ── START GAME ───────────────────────────────────────────────────
async function startGame(){
  show('waitingScreen');
  if(vsMode==='cpu'){
    $('waitMsg').textContent='Cargando sprites...';
    $('displayCode').style.display='none';$('btnCancel').style.display='none';
  } else {
    $('displayCode').style.display='block';$('btnCancel').style.display='block';
  }
  await loadSprites();
  myKey=myRole==='host'?'p1':'p2';
  oppKey=myRole==='host'?'p2':'p1';
  dbg('Listo. role:'+myRole+' vs:'+vsMode);
  showSelectScreen();
}

// ── WIN BUTTONS ──────────────────────────────────────────────────
$('btnRevanche').onclick=async()=>{
  if(vsMode==='cpu'){startGame();return;}
  if(myRole==='host'){await update(roomRef,{status:'ready',state:null,hostChar:null,guestChar:null,guestReady:false,hostReady:false});startGame();}
  else{show('waitingScreen');$('waitMsg').textContent='Esperando revancha...';}
};
$('btnLobbyBack').onclick=async()=>{
  if(roomRef){await remove(roomRef);roomRef=null;}
  roomCode=null;myRole=null;vsMode=null;show('lobbyScreen');
};

// ── KEYBOARD ─────────────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  if(K[e.code])return;K[e.code]=true;
  if(e.code==='KeyF'||e.code==='Space'){myInput.attack=true;pushInput();}
  if(e.code==='KeyH'){myInput.special=true;pushInput();}
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);myInput.block=!!(K['KeyG']||K['KeyL']);pushInput();
});
window.addEventListener('keyup',e=>{
  K[e.code]=false;
  if(e.code==='KeyF'||e.code==='Space')myInput.attack=false;
  if(e.code==='KeyH')myInput.special=false;
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);myInput.block=!!(K['KeyG']||K['KeyL']);pushInput();
});

// ── TOUCH ────────────────────────────────────────────────────────
function setupTouch(){
  function getPos(t){const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)};}
  const near=(p,b)=>Math.hypot(p.x-b.x,p.y-b.y)<b.r*1.5;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();resumeAC();
    for(const t of e.changedTouches){const p=getPos(t);
      if(near(p,BTNS.L)){myInput.left=true;pushInput();}
      if(near(p,BTNS.R)){myInput.right=true;pushInput();}
      if(near(p,BTNS.UP)){myInput.jump=true;pushInput();setTimeout(()=>{myInput.jump=false;pushInput();},200);}
      if(near(p,BTNS.P)){myInput.attack=true;pushInput();setTimeout(()=>{myInput.attack=false;pushInput();},200);}
      if(near(p,BTNS.B)){myInput.block=true;pushInput();}
      if(near(p,BTNS.S)){myInput.special=true;pushInput();setTimeout(()=>{myInput.special=false;pushInput();},200);}
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();myInput.left=false;myInput.right=false;myInput.block=false;pushInput();
  },{passive:false});
}
</script>
