<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
<title>CampCon ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#0a0a1a;overflow:hidden;width:100vw;height:100vh;font-family:'Arial Black',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;}
.screen.hidden{display:none;}
#loginScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);}
#loginScreen h1{font-size:clamp(28px,6vw,60px);color:#FFD700;text-shadow:0 0 30px #FF6600;letter-spacing:6px;margin-bottom:6px;}
#loginScreen p{color:#aaa;font-size:clamp(11px,2.5vw,16px);margin-bottom:30px;}
.btnGoogle{display:flex;align-items:center;gap:12px;background:#fff;color:#333;font-family:'Arial Black',sans-serif;font-size:clamp(13px,2.5vw,18px);padding:12px 24px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.btnGoogle img{width:24px;}
#lobbyScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:10px;}
#lobbyScreen h2{font-size:clamp(18px,4vw,36px);color:#FFD700;margin-bottom:2px;}
.userInfo{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);padding:8px 16px;border-radius:30px;}
.userInfo img{width:30px;height:30px;border-radius:50%;}
.userInfo span{font-size:13px;color:#ddd;}
.menuCards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.menuCard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:130px;padding:16px 10px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.menuCard:hover,.menuCard:active{transform:scale(1.05);}
.menuCard.active{border-color:#fff;}
.menuCard .icon{font-size:28px;}
.menuCard .label{font-family:'Arial Black',sans-serif;font-size:12px;text-align:center;letter-spacing:1px;}
.cardCPU{background:linear-gradient(135deg,#3a006f,#9b00d4);}
.cardMulti{background:linear-gradient(135deg,#003a8c,#0077ff);}
.subMenu{width:100%;max-width:400px;background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;align-items:center;}
.subMenu h3{font-size:12px;color:#aaa;letter-spacing:2px;}
.btnMain{font-family:'Arial Black',sans-serif;font-size:clamp(12px,2.5vw,15px);padding:10px 24px;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;margin:2px;}
.btnCreate{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnCPU{background:linear-gradient(135deg,#6600ff,#cc00ff);color:#fff;}
.btnJoin{background:linear-gradient(135deg,#0066ff,#00ccff);color:#fff;}
.btnLogout{background:rgba(255,255,255,0.08);color:#aaa;font-size:11px;padding:6px 14px;}
#roomCodeInput{font-family:'Arial Black',sans-serif;font-size:18px;padding:9px 16px;border-radius:8px;border:2px solid #0066ff;background:#111;color:#fff;text-align:center;letter-spacing:4px;width:130px;text-transform:uppercase;}
#joinForm{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
#salasList{width:100%;max-width:380px;max-height:120px;overflow-y:auto;}
.salaItem{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 12px;margin-bottom:5px;}
.salaItem span{font-size:12px;color:#ddd;}.salaItem strong{color:#FFD700;}
.btnUnirse{font-family:'Arial Black',sans-serif;font-size:10px;padding:5px 12px;background:linear-gradient(135deg,#0066ff,#00ccff);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.noSalas{font-size:11px;color:#555;text-align:center;padding:6px;}
#waitingScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:16px;}
#waitingScreen h2{font-size:clamp(18px,4vw,32px);color:#FFD700;}
.roomCode{font-size:clamp(28px,7vw,52px);color:#00ccff;letter-spacing:8px;background:rgba(0,204,255,0.1);padding:12px 28px;border-radius:12px;border:2px solid #00ccff;}
.waitDots{font-size:16px;color:#aaa;}
.btnCancel{background:rgba(255,255,255,0.1);color:#aaa;font-size:13px;padding:8px 20px;}
#winScreen{background:rgba(0,0,0,0.92);gap:16px;}
#winScreen h2{font-size:clamp(28px,7vw,64px);color:#FFD700;text-shadow:0 0 40px #FF6600;text-align:center;}
.btnRevanche{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnLobby{background:rgba(255,255,255,0.1);color:#fff;font-size:13px;padding:9px 20px;}
#errMsg{color:#ff4444;font-size:12px;min-height:18px;text-align:center;}
#rotateMsg{position:fixed;inset:0;background:#0a0a1a;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
#rotateMsg .icon{font-size:64px;margin-bottom:16px;animation:spin 2s linear infinite;}
#rotateMsg p{color:#FFD700;font-size:20px;text-align:center;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@media(orientation:portrait){#rotateMsg{display:flex;}}
</style>
</head>
<body>
<div id="rotateMsg"><div class="icon">📱</div><p>Rotá el teléfono<br>para jugar 🕹️</p></div>
<div class="screen" id="loginScreen">

  <p>Banda del Estu — Machi vs Mauron</p>
  <button class="btnGoogle" id="btnGoogle"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">Entrar con Google</button>
</div>

  <h2>🥊 CAMPCON</h2>
  <div class="userInfo"><img id="userAvatar" src="" alt=""><span id="userName"></span></div>
  <div class="menuCards">
    <div class="menuCard cardCPU" id="cardCPU"><div class="icon">🤖</div><div class="label">VS CPU</div></div>
    <div class="menuCard cardMulti" id="cardMulti"><div class="icon">🌐</div><div class="label">MULTIJUGADOR</div></div>
  </div>
  <div class="subMenu hidden" id="subCPU"><h3>VS CPU</h3><button class="btnMain btnCPU" id="btnCPU">⚡ JUGAR AHORA</button></div>
  <div class="subMenu hidden" id="subMulti">
    <h3>MULTIJUGADOR</h3>
    <button class="btnMain btnCreate" id="btnCreate">➕ CREAR SALA</button>
    <div id="salasList"></div>
    <div id="joinForm"><input id="roomCodeInput" maxlength="4" placeholder="CÓDIGO"/><button class="btnMain btnJoin" id="btnJoin">UNIRSE</button></div>
  </div>
  <p id="errMsg"></p>
  <button class="btnMain btnLogout" id="btnLogout">Cerrar sesión</button>
  <div style="position:absolute;bottom:10px;right:14px;font-size:11px;color:rgba(255,255,255,0.25);font-family:monospace;">v0.15</div>
</div>
<div class="screen hidden" id="waitingScreen">
  <h2>Compartí el código</h2>
  <div class="roomCode" id="displayCode">----</div>
  <p class="waitDots" id="waitMsg">Esperando al rival...</p>
  <button class="btnMain btnCancel" id="btnCancel">Cancelar</button>
</div>
<div class="screen hidden" id="selectScreen">
  <h2 style="color:#FFD700;font-size:clamp(18px,4vw,32px);margin-bottom:12px;">⚡ ELEGÍ TU PERSONAJE ⚡</h2>
  <div style="display:flex;gap:24px;justify-content:center;align-items:center;">
    <div id="selCard0" onclick="selectChar(0)" style="cursor:pointer;padding:16px 20px;border-radius:14px;border:3px solid transparent;background:rgba(255,215,0,0.1);text-align:center;">
      <canvas id="selCanvas0" width="140" height="200" style="display:block;margin:0 auto;"></canvas>
      <div style="font-family:'Arial Black',sans-serif;font-size:16px;color:#FFD700;margin-top:8px;">MACHI</div>
    </div>
    <div style="font-family:'Arial Black',sans-serif;font-size:40px;color:#fff;opacity:0.5;">VS</div>
    <div id="selCard1" onclick="selectChar(1)" style="cursor:pointer;padding:16px 20px;border-radius:14px;border:3px solid transparent;background:rgba(0,255,127,0.1);text-align:center;">
      <canvas id="selCanvas1" width="140" height="200" style="display:block;margin:0 auto;"></canvas>
      <div style="font-family:'Arial Black',sans-serif;font-size:16px;color:#00FF7F;margin-top:8px;">MAURON</div>
    </div>
  </div>
  <p style="color:#aaa;font-size:13px;margin-top:12px;">Tocá el personaje que querés usar</p>
</div>
<canvas id="c" style="display:none;"></canvas>
<div class="screen hidden" id="winScreen">
  <h2 id="winTxt"></h2>
  <button class="btnMain btnRevanche" id="btnRevanche">🥊 REVANCHA</button>
  <button class="btnMain btnLobby" id="btnLobbyBack">Volver al lobby</button>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,set,get,onValue,update,remove,off}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig={apiKey:"AIzaSyBLii7JWZgNSoMZ7xLWeFRYvQ2Wx4snX-k",authDomain:"campcon-banda-estu.firebaseapp.com",databaseURL:"https://campcon-banda-estu-default-rtdb.firebaseio.com",projectId:"campcon-banda-estu",storageBucket:"campcon-banda-estu.firebasestorage.app",messagingSenderId:"790816311475",appId:"1:790816311475:web:7835a520eaa7545d2cc8c6"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getDatabase(fbApp);

const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$(id).classList.remove('hidden');}
function showCanvas(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$('c').style.display='block';}
function hideCanvas(){$('c').style.display='none';}
function err(msg){$('errMsg').textContent=msg;setTimeout(()=>$('errMsg').textContent='',3000);}

const BASE='https://lucascole89.github.io/Campcon_Banda_Estu/';
const W=900,H=500,FLOOR=H-38,GR=0.75,SPMAX=100,TICK=33;
const FH=248,FW=80;

// ── AUTH ──────────────────────────────────────────────────────────
let currentUser=null,myRole=null,roomCode=null,roomRef=null,vsMode=null;
$('btnGoogle').onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>console.error(e));
$('btnLogout').onclick=()=>signOut(auth);
onAuthStateChanged(auth,user=>{
  if(user){currentUser=user;$('userName').textContent=user.displayName||user.email;$('userAvatar').src=user.photoURL||'';show('lobbyScreen');watchSalas();}
  else{currentUser=null;show('loginScreen');}
});
$('cardCPU').onclick=()=>{$('subCPU').classList.remove('hidden');$('subMulti').classList.add('hidden');$('cardCPU').classList.add('active');$('cardMulti').classList.remove('active');};
$('cardMulti').onclick=()=>{$('subMulti').classList.remove('hidden');$('subCPU').classList.add('hidden');$('cardMulti').classList.add('active');$('cardCPU').classList.remove('active');};
function watchSalas(){
  onValue(ref(db,'rooms'),snap=>{
    const list=$('salasList'),d=snap.val();
    if(!d){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    const ab=Object.entries(d).filter(([k,v])=>v.status==='waiting'&&v.host!==currentUser?.uid);
    if(!ab.length){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    list.innerHTML=ab.map(([code,v])=>`<div class="salaItem"><span><strong>${v.hostName||'Alguien'}</strong> — <strong>${code}</strong></span><button class="btnUnirse" onclick="joinSala('${code}')">UNIRSE</button></div>`).join('');
  });
}
window.joinSala=async code=>{$('roomCodeInput').value=code;$('btnJoin').click();};
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
$('btnCreate').onclick=async()=>{
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=genCode();roomRef=ref(db,`rooms/${roomCode}`);
    await set(roomRef,{host:currentUser.uid,hostName:currentUser.displayName,guest:null,guestName:null,status:'waiting',state:null});
    myRole='host';vsMode='online';
    $('displayCode').textContent=roomCode;$('waitMsg').textContent='Esperando al rival...';show('waitingScreen');
    onValue(roomRef,snap=>{const d=snap.val();if(!d)return;if(d.status==='ready'&&d.guest){off(roomRef);startGame();}});
  }catch(e){err('Error: '+e.message);}
};
$('btnJoin').onclick=async()=>{
  const code=$('roomCodeInput').value.trim().toUpperCase();
  if(code.length!==4){err('Código de 4 letras');return;}
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=code;roomRef=ref(db,`rooms/${roomCode}`);
    const snap=await get(roomRef);
    if(!snap.exists()){err('Sala no encontrada');return;}
    const d=snap.val();if(d.status!=='waiting'){err('Sala ya en juego');return;}
    await update(roomRef,{guest:currentUser.uid,guestName:currentUser.displayName,status:'ready'});
    myRole='guest';vsMode='online';startGame();
  }catch(e){err('Error: '+e.message);}
};
$('btnCPU').onclick=()=>{myRole='host';vsMode='cpu';roomCode=null;roomRef=null;startGame();};
$('btnCancel').onclick=async()=>{if(roomRef)await remove(roomRef);roomRef=null;roomCode=null;myRole=null;vsMode=null;show('lobbyScreen');};

// ── SPRITES ───────────────────────────────────────────────────────
function removeChroma(img){
  const oc=document.createElement('canvas');oc.width=img.naturalWidth;oc.height=img.naturalHeight;
  const ox=oc.getContext('2d');ox.drawImage(img,0,0);
  const d=ox.getImageData(0,0,oc.width,oc.height);
  for(let i=0;i<d.data.length;i+=4){
    const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
    if(g>120&&g-r>60&&g-b>60)d.data[i+3]=0;
    else if(b>120&&b-r>60&&b-g>40)d.data[i+3]=0;
  }
  ox.putImageData(d,0,0);return oc;
}
async function loadImg(path,noChroma=false){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>res(noChroma?img:removeChroma(img));
    img.onerror=()=>{console.warn('MISSING:',path);res(null);};
    img.src=BASE+path;
  });
}
const PATHS={
  machi:{
    idle:['Machi/Machi_Idle_01.png','Machi/Machi_Idle_02.png','Machi/Machi_Idle_03.png','Machi/Machi_Idle_04.png','Machi/Machi_Idle_05.png'],
    walk:['Machi/Machi_Caminata_01.png','Machi/Machi_Caminata_02.png','Machi/Machi_Caminata_03.png','Machi/Machi_Caminata_04.png'],
    jump:['Machi/Machi_Salto_01.png','Machi/Machi_Salto_02.png','Machi/Machi_Salto_03.png','Machi/Machi_Salto_04.png'],
    attack:['Machi/Machi_Pu%C3%B1o_Basico_01.png','Machi/Machi_Pu%C3%B1o_Basico_02.png','Machi/Machi_Pu%C3%B1o_Basico_03.png','Machi/Machi_Pu%C3%B1o_Basico_04.png'],
    special:['Machi/Machi_Ataque_Especial_01.png','Machi/Machi_Ataque_Especial_02.png','Machi/Machi_Ataque_Especial_03.png','Machi/Machi_Ataque_Especial_04.png','Machi/Machi_Ataque_Especial_05.png','Machi/Machi_Ataque_Especial_06.png','Machi/Machi_Ataque_Especial_07.png','Machi/Machi_Ataque_Especial_08.png'],
    block:['Machi/Machi_Bloqueo_01.png','Machi/Machi_Bloqueo_02.png','Machi/Machi_Bloqueo_03.png'],
    hurt:['Machi/Machi_Hit_Reaction.png'],
    ko:['Machi/Machi_Vencido.png'],
    defeated:['Machi/Machi_Vencido.png'],
    celeb:['Machi/Machi_Festejo_01.png','Machi/Machi_Festejo_02.png','Machi/Machi_Festejo_03.png','Machi/Machi_Festejo_04.png'],
    jumpKick:['Machi/Machi_Jump_Kick.png'],
    jumpPunch:['Machi/Machi_Jump_Punch.png'],
  },
  mauron:{
    idle:['Mauron/Mauron_Idle_01.png','Mauron/Mauron_Idle_02.png','Mauron/Mauron_Idle_03.png','Mauron/Mauron_Idle_04.png','Mauron/Mauron_Idle_05.png'],
    walk:['Mauron/Mauron_Walk_01.png','Mauron/Mauron_Walk_02.png','Mauron/Mauron_Walk_03.png','Mauron/Mauron_Walk_04.png'],
    jump:['Mauron/Mauron_Jump_01.png','Mauron/Mauron_Jump_02.png','Mauron/Mauron_Jump_03.png','Mauron/Mauron_Jump_04_aterrizaje.png'],
    attack:['Mauron/Mauron_Punch_01.png'],
    special:['Mauron/Mauron_Special_Attack_01.png','Mauron/Mauron_Special_Attack_02.png','Mauron/Mauron_Special_Attack_03.png','Mauron/Mauron_Special_Attack_04.png'],
    plants:['Mauron/Mauron_Special_Attack_05_Modulo_Plantas.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_01.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_02.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_03.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_04.png'],
    block:['Mauron/Mauron_Block_01.png'],
    hurt:['Mauron/Mauron_Hit_against_01.png'],
    ko:['Mauron/Mauron_defeated_01.png'],
    defeated:['Mauron/Mauron_Defeated_en_piso_02.png'],
    celeb:['Mauron/Mauron_Festejo_01.png','Mauron/Mauron_Festejo_02.png','Mauron/Mauron_Festejo_03.png','Mauron/Mauron_Festejo_04.png'],
    jumpKick:['Mauron/Mauron_Kick_Jump.png'],
    jumpPunch:['Mauron/Mauron_Punch_Jump.png'],
  }
};
let SP={machi:{},mauron:{},bg:null},spritesLoaded=false;
async function loadSprites(){
  if(spritesLoaded)return;
  async function loadGroup(paths){const out={};for(const[k,arr]of Object.entries(paths))out[k]=await Promise.all(arr.map(p=>loadImg(p)));return out;}
  [SP.machi,SP.mauron,SP.bg]=await Promise.all([loadGroup(PATHS.machi),loadGroup(PATHS.mauron),loadImg('Escenarios_001_Estudiantil_v2.png',true)]);
  spritesLoaded=true;
}

// ── CANVAS ────────────────────────────────────────────────────────
const canvas=$('c'),ctx=canvas.getContext('2d');
function resize(){
  const dpr=window.devicePixelRatio||1;
  const s=Math.min(innerWidth/W,innerHeight/H);
  canvas.style.width=s*W+'px';canvas.style.height=s*H+'px';
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// ── ROUNDS ────────────────────────────────────────────────────────
let wins={p1:0,p2:0},currentRound=1,roundBanner=null;

function initRound(){
  gs={
    p1:{x:W*0.28,y:FLOOR,vy:0,hp:100,hp2:100,special:0,state:'idle',frame:0,facing:1,blocking:false,grounded:true,_attackHit:false,_airAtk:null,wiggle:0},
    p2:{x:W*0.72,y:FLOOR,vy:0,hp:100,hp2:100,special:0,state:'idle',frame:0,facing:-1,blocking:false,grounded:true,_attackHit:false,_airAtk:null,wiggle:0},
    timer:90,phase:'fight',specialName:null
  };
  fTimer={p1:0,p2:0};hitCD={p1:0,p2:0};inv={p1:0,p2:0};
  bgOffset=0;tickN=0;specialPhase=null;koSeq=null;
  myInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
  oppInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
}
function initGS(){wins={p1:0,p2:0};currentRound=1;roundBanner=null;initRound();}

// ── STATE ─────────────────────────────────────────────────────────
let gs,fTimer,hitCD,inv,bgOffset,tickN,specialPhase,timerInt,myKey,oppKey,koSeq;
let myInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let oppInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let inputRef=null,oppInputRef=null,stateRef=null;

// ── SPRITE HELPERS ────────────────────────────────────────────────
function getSP(pk){return pk==='p1'?SP._p1:SP._p2;}
function getFrames(pk,st){
  const s=getSP(pk),state=st||gs[pk].state;
  // ataque aéreo
  if(state==='attack'&&gs[pk]?._airAtk)return s[gs[pk]._airAtk]||s.attack||[];
  const map={idle:'idle',walk:'walk',jump:'jump',attack:'attack',special:'special',block:'block',hurt:'hurt',ko:'ko',defeated:'defeated',celeb:'celeb',jumpKick:'jumpKick',jumpPunch:'jumpPunch'};
  return s[map[state]||'idle']||[];
}

// ── DRAW SINGLE SPRITE ────────────────────────────────────────────
// Dibuja UNA imagen con transform. Sin lógica de estado.
function drawSpriteAt(img,x,y,h,facing,tint,wiggle){
  if(!img)return;
  const dw=img.width*(h/img.height);
  // offset puño Mauron
  let offX=0;
  ctx.save();
  const wx=wiggle?Math.sin(Date.now()*0.05)*4:0;
  if(facing<0){ctx.translate(x+dw/2+offX+wx,y-h);ctx.scale(-1,1);}
  else{ctx.translate(x-dw/2+offX+wx,y-h);}
  if(tint){
    // dibujar en offscreen con tint rojo
    const oc=document.createElement('canvas');oc.width=dw;oc.height=h;
    const ox=oc.getContext('2d');ox.drawImage(img,0,0,dw,h);
    ox.globalCompositeOperation='source-atop';ox.fillStyle=tint;ox.fillRect(0,0,dw,h);
    ctx.drawImage(oc,0,0);
  } else {
    ctx.drawImage(img,0,0,dw,h);
  }
  ctx.restore();
}

// Dibuja el fighter activo desde gs[pk]
function drawFighter(pk){
  const f=gs[pk];
  const sp=getSP(pk);
  const frames=getFrames(pk);
  const img=frames[Math.min(f.frame,Math.max(0,frames.length-1))];
  const tint=f.state==='hurt'?'rgba(255,0,0,0.55)':null;
  const wiggle=f.state==='hurt'&&f.wiggle>0;
  // offset puño mauron
  let ox=0;
  if(sp===SP.mauron&&f.state==='attack'&&!f._airAtk)ox=f.facing>0?20:-20;
  const x=f.x+ox;
  drawSpriteAt(img,x,f.y,FH,f.facing,tint,wiggle);
  if(f.blocking){
    ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#4af';
    const dw=img?(FH/img.height)*img.width:FW;
    ctx.beginPath();ctx.ellipse(f.x+(f.facing>0?dw*0.3:-dw*0.3),f.y-FH/2,40,75,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
}

// ── BG ────────────────────────────────────────────────────────────
function drawBg(){
  if(SP.bg){const bW=W*1.4;ctx.drawImage(SP.bg,-bgOffset*(bW-W),0,bW,H);}
  else{ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);}
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}

// ── HUD ───────────────────────────────────────────────────────────
function drawHUD(){
  const bW=290,bH=14,gap=2,spH=7,y1=10,y2=y1+bH+gap,y3=y2+bH+gap;
  function twoBar(x,p1,p2,right){
    ctx.fillStyle='#111';ctx.fillRect(x,y1,bW,bH);
    const fw=bW*Math.max(0,Math.min(1,p1));ctx.fillStyle='#e63946';ctx.fillRect(right?x+bW-fw:x,y1,fw,bH);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(x,y1,bW,bH);
    ctx.fillStyle='#111';ctx.fillRect(x,y2,bW,bH);
    const fw2=bW*Math.max(0,Math.min(1,p2));ctx.fillStyle='#c0392b';ctx.fillRect(right?x+bW-fw2:x,y2,fw2,bH);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(x,y2,bW,bH);
  }
  function spBar(x,pct,col,right){
    ctx.fillStyle='#111';ctx.fillRect(x,y3,bW,spH);
    const fw=bW*Math.max(0,Math.min(1,pct));ctx.fillStyle=col;ctx.fillRect(right?x+bW-fw:x,y3,fw,spH);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y3,bW,spH);
    if(pct>=1){ctx.save();ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.008);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y3,bW,spH);ctx.restore();}
  }
  twoBar(10,gs.p1.hp/100,gs.p1.hp2/100,false);spBar(10,gs.p1.special/SPMAX,'#FFD700',false);
  ctx.fillStyle='#fff';ctx.font='bold 10px Arial';ctx.textAlign='left';ctx.fillText(vsMode==='cpu'?'VOS':'MACHI',12,y1+11);
  twoBar(W-10-bW,gs.p2.hp/100,gs.p2.hp2/100,true);spBar(W-10-bW,gs.p2.special/SPMAX,'#00FF7F',true);
  ctx.textAlign='right';ctx.fillText(vsMode==='cpu'?'CPU':'MAURON',W-12,y1+11);
  // timer
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(W/2-26,8,52,26,6);ctx.fill();
  ctx.fillStyle=gs.timer<=10?'#ff4444':'#fff';ctx.font='bold 18px Arial Black';ctx.textAlign='center';ctx.fillText(Math.ceil(gs.timer),W/2,26);
  // puntos rounds
  for(let i=0;i<2;i++){ctx.fillStyle=wins.p1>i?'#FFD700':'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(W/2-22+i*14,y3+spH+8,4,0,Math.PI*2);ctx.fill();}
  for(let i=0;i<2;i++){ctx.fillStyle=wins.p2>i?'#00FF7F':'rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(W/2+8+i*14,y3+spH+8,4,0,Math.PI*2);ctx.fill();}
  // especial listo
  if(gs.p1.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#FFD700';ctx.font='bold 8px Arial';ctx.textAlign='left';ctx.fillText('⚡LISTO!',12,y3+spH+10);ctx.restore();}
  if(gs.p2.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#00FF7F';ctx.font='bold 8px Arial';ctx.textAlign='right';ctx.fillText('⚡LISTO!',W-12,y3+spH+10);ctx.restore();}
  // nombre especial activo
  if(specialPhase){
    const isMachi=SP._p1===SP.machi?specialPhase.pk==='p1':specialPhase.pk==='p2';
    const atkName=isMachi?'CHAMPAGNE SUPERNOVA':'ABSOLUT PLANTS';
    const col=isMachi?'#FFD700':'#00FF7F';
    ctx.fillStyle=col;ctx.font='bold 12px Arial Black';ctx.textAlign='center';
    ctx.shadowColor=col;ctx.shadowBlur=8;ctx.fillText(atkName,W/2,H-8);ctx.shadowBlur=0;
  }
  // banner round
  if(roundBanner){
    roundBanner.t++;
    const alpha=roundBanner.t<20?roundBanner.t/20:roundBanner.t>60?1-(roundBanner.t-60)/20:1;
    ctx.save();ctx.globalAlpha=Math.max(0,alpha);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H*0.38,W,H*0.24);
    ctx.fillStyle='#FFD700';ctx.font='bold '+Math.floor(W*0.065)+'px Arial Black';
    ctx.textAlign='center';ctx.shadowColor='#FF6600';ctx.shadowBlur=20;
    ctx.fillText(roundBanner.text,W/2,H*0.57);ctx.shadowBlur=0;ctx.restore();
    if(roundBanner.t>=80)roundBanner=null;
  }
}

const BTNS={L:{x:60,y:H-70,r:32},R:{x:140,y:H-70,r:32},UP:{x:100,y:H-145,r:32},P:{x:W-60,y:H-70,r:32},B:{x:W-140,y:H-70,r:32},S:{x:W-200,y:H-135,r:32}};
function drawControls(){
  ctx.save();ctx.globalAlpha=0.6;
  const D=(b,lbl,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold ${b.r*0.6}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,b.x,b.y);ctx.textBaseline='alphabetic';};
  D(BTNS.L,'◀','#223');D(BTNS.R,'▶','#223');D(BTNS.UP,'▲','#232');
  D(BTNS.P,'P','#332');D(BTNS.B,'B','#322');D(BTNS.S,'S','#223');
  ctx.restore();
}

// ── SPECIAL ───────────────────────────────────────────────────────
// El especial dibuja SOLO los sprites del ataque, sobre fondo normal.
// NUNCA se dibujan dos sprites del mismo personaje a la vez.
// Durante el especial: el lanzador se reemplaza con el sprite del ataque,
// el receptor se mantiene congelado en su pose actual.
function drawSpecial(){
  const s=specialPhase;if(!s)return;
  const pk=s.pk,ok=s.ok;
  const launcherIsMachi=getSP(pk)===SP.machi;
  const frozenOpp=s.frozenOpp; // solo el oponente congelado

  // fondo normal
  drawBg();

  // 1) Dibujar SOLO el oponente congelado (UNA sola vez)
  if(frozenOpp){
    const frames=getFrames(ok,frozenOpp.state);
    const img=frames[Math.min(frozenOpp.frame,Math.max(0,frames.length-1))];
    // tint rojo si recibió daño
    const tint=s.oppHit?'rgba(255,0,0,0.55)':null;
    const wx=s.oppWiggle>0?Math.sin(Date.now()*0.05)*4:0;
    if(img){
      const dw=img.width*(FH/img.height);
      ctx.save();
      if(frozenOpp.facing<0){ctx.translate(frozenOpp.x+dw/2+wx,frozenOpp.y-FH);ctx.scale(-1,1);}
      else ctx.translate(frozenOpp.x-dw/2+wx,frozenOpp.y-FH);
      if(tint){
        const oc=document.createElement('canvas');oc.width=dw;oc.height=FH;
        const ox2=oc.getContext('2d');ox2.drawImage(img,0,0,dw,FH);
        ox2.globalCompositeOperation='source-atop';ox2.fillStyle=tint;ox2.fillRect(0,0,dw,FH);
        ctx.drawImage(oc,0,0);
      } else ctx.drawImage(img,0,0,dw,FH);
      ctx.restore();
    }
    if(s.oppWiggle>0)s.oppWiggle--;
  }

  // 2) Dibujar SOLO el sprite del ataque del lanzador (reemplaza su sprite normal)
  const p=gs[pk];
  if(launcherIsMachi){
    // MACHI: champagne
    const atkFrames=SP.machi?.special||[];
    const fi=Math.min(Math.floor(s.t/3),atkFrames.length-1);
    const af=atkFrames[fi];
    if(af){
      const dw=af.width*(FH/af.height),bodyW=dw*0.30;
      ctx.save();
      if(p.facing>0){ctx.translate(p.x-bodyW,p.y-FH);}
      else{ctx.translate(p.x+bodyW,p.y-FH);ctx.scale(-1,1);ctx.translate(-dw,0);}
      ctx.drawImage(af,0,0,dw,FH);ctx.restore();
    }
    // último frame: quedarse 12 ticks extra
    const isLast=fi>=atkFrames.length-1;
    if(!s.holdStarted&&isLast){s.holdStarted=true;s.holdT=0;}
    if(s.holdStarted)s.holdT++;
    // hit cuando champagne llega al oponente
    if(fi>=4&&!s.damageDealt){
      s.damageDealt=true;
      const champEnd=p.facing>0?p.x+250:p.x-250;
      if(Math.abs(champEnd-frozenOpp.x)<220){
        applySpecialDamage(ok,pk,s);
      }
    }
  } else {
    // MAURON: semillas t=0-35 → plantas t=35+
    if(s.t<35){
      const spF=SP.mauron?.special||[];
      const fi=Math.min(Math.floor(s.t/9),spF.length-1);
      const sf=spF[fi];
      if(sf){
        const dw=sf.width*(FH/sf.height);
        ctx.save();
        if(p.facing<0){ctx.translate(p.x+dw/2,p.y-FH);ctx.scale(-1,1);}
        else ctx.translate(p.x-dw/2,p.y-FH);
        ctx.drawImage(sf,0,0,dw,FH);ctx.restore();
      }
    } else {
      // plantas nacen en plantX
      const plants=SP.mauron?.plants||[];
      const fi=Math.min(Math.floor((s.t-35)/4),plants.length-1);
      const pf=plants[fi];
      const plantX=s.plantX;
      if(pf){
        const ph=FH*0.85,pw=pf.width*(ph/pf.height);
        ctx.save();ctx.translate(plantX,FLOOR);
        ctx.drawImage(pf,-pw/2,-ph,pw,ph);ctx.restore();
      }
      // último frame: quedarse 12 ticks
      const isLast=fi>=plants.length-1;
      if(!s.holdStarted&&isLast){s.holdStarted=true;s.holdT=0;}
      if(s.holdStarted)s.holdT++;
      // hit cuando plantas son grandes (fi>=2) en la zona donde nacen
      if(fi>=2&&!s.damageDealt){
        s.damageDealt=true;
        if(Math.abs(plantX-frozenOpp.x)<130){
          applySpecialDamage(ok,pk,s);
        }
      }
    }
    // también mostrar al Mauron en su sprite de lanzar (reemplaza al frozen)
    // (ya lo dibujamos arriba — si t<35 aparece mauron con semillas)
  }

  s.t++;
  // terminar cuando holdT >= 12 (si llegó al último frame) o t >= 90
  const done=s.holdStarted?s.holdT>=12:s.t>=90;
  if(done){
    specialPhase=null;
    if(gs.phase!=='ko'){
      gs.phase='fight';gs.specialName=null;
      gs[pk].state='idle';gs[pk].frame=0;
      const opp=gs[ok];
      if(opp.state!=='ko'){
        // si recibió el ataque, poner hurt temporalmente
        if(s.damageDealt&&opp.hp>0){opp.state='hurt';opp.frame=0;inv[ok]=15;}
        else{opp.state='idle';opp.frame=0;}
        inv[ok]=0;
      }
    }
  }
}

function applySpecialDamage(targetKey,launcherKey,s){
  const target=gs[targetKey];
  if(target.state==='ko')return;
  s.oppHit=true;s.oppWiggle=20;
  if(!target.blocking){
    const dmg=35;
    target.hp=Math.max(0,target.hp-dmg);
    if(target.hp<=0&&target.hp2<=0){
      setTimeout(()=>startKOSequence(targetKey,launcherKey),300);
    } else if(target.hp<=0){
      target.hp=target.hp2;target.hp2=0;
    }
  } else {
    target.hp=Math.max(0,target.hp-8);
  }
}

// ── KO SEQUENCE ───────────────────────────────────────────────────
function startKOSequence(loserKey,winnerKey){
  if(gs.phase==='ko')return;
  const loser=gs[loserKey];
  const dir=loser.x<gs[winnerKey].x?-1:1;
  koSeq={loser:loserKey,winner:winnerKey,t:0,phase:'flyback',
    vx:dir*8,vy:-10,celebFrame:0,celebTimer:0,
    winnerName:vsMode==='cpu'?(winnerKey==='p1'?currentUser?.displayName||'VOS':'CPU'):(winnerKey==='p1'?'MACHI':'MAURON')
  };
  gs[loserKey].state='ko';
  gs[winnerKey].state='celeb';
  gs.phase='ko';
  clearInterval(timerInt);
  wins[winnerKey]++;
  koSeq.matchWin=wins[winnerKey]>=2;
}

function updateKOSeq(){
  if(!koSeq)return;
  const s=koSeq,loser=gs[s.loser];
  if(s.phase==='flyback'){
    s.vx*=0.88;s.vy+=GR;loser.x+=s.vx;loser.y+=s.vy;
    if(loser.y>=FLOOR){
      loser.y=FLOOR;s.phase='floor';
      loser.state='defeated';loser.frame=0;s.t=0;
    }
  } else if(s.phase==='floor'){
    s.t++;
    if(s.t>60){
      if(s.matchWin){s.phase='celeb';s.t=0;}
      else{
        currentRound++;
        roundBanner={text:'ROUND '+currentRound,t:0};
        koSeq=null;
        setTimeout(()=>{initRound();startTimer();},1500);
      }
    }
  } else if(s.phase==='celeb'){
    s.t++;s.celebTimer++;
    if(s.celebTimer>3){s.celebTimer=0;s.celebFrame++;}
    const cf=getFrames(s.winner,'celeb');
    if(s.celebFrame>=cf.length)s.celebFrame=0;
    gs[s.winner].frame=s.celebFrame;
    if(s.t>180){
      s.phase='done';
      setTimeout(()=>{hideCanvas();$('winTxt').textContent=`${s.winnerName} WINS!`;show('winScreen');},500);
    }
  }
}

function drawKOOverlay(){
  if(!koSeq||koSeq.phase==='done')return;
  const s=koSeq,loser=gs[s.loser];
  // SOLO dibujar el loser en defeated — UNA sola vez
  const frames=getFrames(s.loser,'defeated');
  const img=frames[0];
  if(img)drawSpriteAt(img,loser.x,loser.y,FH,loser.facing,null,false);
  if(s.phase==='celeb'){
    const alpha=Math.min(1,s.t/30);
    ctx.save();ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H*0.35,W,H*0.22);
    ctx.fillStyle='#FFD700';ctx.shadowColor='#FF6600';ctx.shadowBlur=30;
    ctx.font='bold '+Math.floor(W*0.065)+'px Arial Black';ctx.textAlign='center';
    ctx.fillText(s.winnerName.toUpperCase()+' WINS!',W/2,H*0.52);
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ── PHYSICS ───────────────────────────────────────────────────────
function physicsTick(){
  ['p1','p2'].forEach(pk=>{
    const p=gs[pk];
    if(['ko','defeated'].includes(p.state))return;
    if(inv[pk]>0)inv[pk]--;if(hitCD[pk]>0)hitCD[pk]--;
    if(!p.grounded){p.vy+=GR;p.y+=p.vy;}
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.grounded=true;if(p.state==='jump')p.state='idle';}
    if(p.wiggle>0)p.wiggle--;
    fTimer[pk]++;
    const frames=getFrames(pk);
    const nf=frames.length||1;
    const spd=p.state==='attack'?(nf<=1?8:5):p.state==='walk'?5:p.state==='celeb'?3:p.state==='special'?5:8;
    if(fTimer[pk]>=spd){fTimer[pk]=0;p.frame++;}
    if(p.frame>=nf){
      const noLoop=['ko','hurt','defeated'];
      if(!noLoop.includes(p.state))p.frame=0;
      else p.frame=nf-1;
      if(p.state==='attack'){p.state='idle';p.frame=0;p._attackHit=false;p._airAtk=null;}
      if(p.state==='hurt'){p.state='idle';p.frame=0;}
    }
  });
  // collision
  if(gs.p1.grounded&&gs.p2.grounded){
    const md=FW*1.1;
    if(Math.abs(gs.p1.x-gs.p2.x)<md){
      const push=(md-Math.abs(gs.p1.x-gs.p2.x))/2+1;
      if(gs.p1.x<=gs.p2.x){gs.p1.x-=push;gs.p2.x+=push;}else{gs.p1.x+=push;gs.p2.x-=push;}
    }
  }
  gs.p1.x=Math.max(60,Math.min(W-60,gs.p1.x));
  gs.p2.x=Math.max(60,Math.min(W-60,gs.p2.x));
  if(!['attack','special','hurt','ko','defeated','block'].includes(gs.p1.state))gs.p1.facing=gs.p2.x>gs.p1.x?1:-1;
  if(!['attack','special','hurt','ko','defeated','block'].includes(gs.p2.state))gs.p2.facing=gs.p1.x>gs.p2.x?1:-1;
  const avgX=(gs.p1.x+gs.p2.x)/2;
  bgOffset=Math.max(0,Math.min(1,(avgX-W*0.35)/(W*0.3)));
}

// ── APPLY INPUT ───────────────────────────────────────────────────
function applyInput(pk,inp){
  const p=gs[pk];if(['ko','defeated','special'].includes(p.state))return;
  const ok=pk==='p1'?'p2':'p1',opp=gs[ok];
  if(inp.left){p.x-=4.5;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(inp.right){p.x+=4.5;if(p.grounded&&p.state!=='attack')p.state='walk';}
  else if(p.state==='walk')p.state='idle';
  if(inp.jump&&p.grounded&&p.state!=='attack'){p.vy=-17;p.grounded=false;p.state='jump';p.frame=0;}
  p.blocking=!!(inp.block&&p.grounded);
  if(p.blocking&&p.state!=='attack')p.state='block';
  else if(!p.blocking&&p.state==='block')p.state='idle';
  if(!['attack','hurt','ko','block','defeated'].includes(p.state))p.facing=opp.x>p.x?1:-1;
  // ataque
  if(inp.attack&&p.state!=='attack'&&!['hurt','ko','defeated'].includes(p.state)&&hitCD[pk]===0){
    p.state='attack';p.frame=0;p._attackHit=false;
    p._airAtk=!p.grounded?(Math.random()<0.5?'jumpKick':'jumpPunch'):null;
  }
  const atkFrames=p._airAtk?getFrames(pk,p._airAtk):getFrames(pk,'attack');
  const hitFrom=atkFrames.length<=1?0:1;
  if(p.state==='attack'&&p.frame>=hitFrom&&!p._attackHit&&fTimer[pk]>=2){
    const dist=Math.abs(p.x-opp.x);
    const range=p._airAtk?160:130;
    if(dist<=range){
      p._attackHit=true;
      if(!opp.blocking&&inv[ok]===0){
        const dmg=p._airAtk?14:10;
        opp.hp=Math.max(0,opp.hp-dmg);
        opp.state='hurt';opp.frame=0;opp.wiggle=18;inv[ok]=15;
        p.special=Math.min(SPMAX,p.special+15);
        if(opp.hp<=0&&opp.hp2<=0)startKOSequence(ok,pk);
        else if(opp.hp<=0){opp.hp=opp.hp2;opp.hp2=0;}
      } else if(opp.blocking){opp.hp=Math.max(0,opp.hp-2);p.special=Math.min(SPMAX,p.special+6);}
      hitCD[pk]=20;
    }
  }
  // especial
  if(inp.special&&p.special>=SPMAX&&!['hurt','ko','defeated','special'].includes(p.state)){
    p.special=0;p.state='special';p.frame=0;
    gs.phase='special';
    gs.specialName=getSP(pk)===SP.machi?'MACHI':'MAURON';
    const plantX=p.x+(p.facing>0?220:-220);
    // capturar SOLO el estado del oponente
    const opp2=gs[ok];
    specialPhase={
      name:gs.specialName,pk,ok,t:0,
      damageDealt:false,plantX,
      frozenOpp:{...opp2}, // solo el oponente
      oppHit:false,oppWiggle:0,
      holdStarted:false,holdT:0
    };
  }
}

// ── CPU ───────────────────────────────────────────────────────────
let cpuTick=0;
const cpuInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
function updateCPU(){
  const cpu=gs.p2,pl=gs.p1;if(['ko','defeated'].includes(cpu.state))return;
  cpuTick++;
  const dist=Math.abs(cpu.x-pl.x);
  cpuInput.left=false;cpuInput.right=false;cpuInput.jump=false;cpuInput.attack=false;cpuInput.block=false;cpuInput.special=false;
  if(dist>140){cpuInput.left=cpu.x>pl.x;cpuInput.right=cpu.x<pl.x;}
  if(dist<130&&cpuTick%30===0){if(cpu.special>=SPMAX&&Math.random()<0.2)cpuInput.special=true;else cpuInput.attack=true;}
  if(Math.random()<0.006&&cpu.grounded)cpuInput.jump=true;
  if(pl.state==='attack'&&dist<150&&Math.random()<0.3)cpuInput.block=true;
}

// ── HOST TICK ─────────────────────────────────────────────────────
function hostTick(){
  if(koSeq&&koSeq.phase!=='done'){updateKOSeq();return;}
  if(gs.phase==='fight'){
    if(vsMode==='cpu')updateCPU();
    applyInput('p1',vsMode==='online'?(myRole==='host'?myInput:oppInput):myInput);
    applyInput('p2',vsMode==='online'?(myRole==='guest'?myInput:oppInput):cpuInput);
    physicsTick();
    if(vsMode==='online'&&tickN%2===0)pushState();
  } else if(gs.phase==='special'){
    // durante el especial solo mover física del lanzador si necesario
    if(vsMode==='online'&&tickN%2===0)pushState();
  }
  tickN++;
}

// ── SYNC ──────────────────────────────────────────────────────────
function setupSync(){
  if(vsMode!=='online')return;
  inputRef=ref(db,`rooms/${roomCode}/input/${myKey}`);
  oppInputRef=ref(db,`rooms/${roomCode}/input/${oppKey}`);
  stateRef=ref(db,`rooms/${roomCode}/state`);
  onValue(oppInputRef,snap=>{const d=snap.val();if(d)Object.assign(oppInput,d);});
  if(myRole==='guest'){
    onValue(stateRef,snap=>{
      const d=snap.val();if(!d)return;
      Object.assign(gs.p1,d.p1);Object.assign(gs.p2,d.p2);
      gs.timer=d.timer;gs.phase=d.phase||'fight';
      if(d.specialName&&!specialPhase){
        specialPhase={name:d.specialName,pk:d.spPk,ok:d.spOk,t:0,damageDealt:false,
          plantX:d.plantX||null,frozenOpp:d.frozenOpp||null,oppHit:false,oppWiggle:0,holdStarted:false,holdT:0};
      }
    });
  }
}
function pushInput(){if(inputRef&&vsMode==='online')set(inputRef,{...myInput});}
function pushState(){
  if(!stateRef||myRole!=='host'||vsMode!=='online')return;
  set(stateRef,{
    p1:{x:gs.p1.x,y:gs.p1.y,hp:gs.p1.hp,hp2:gs.p1.hp2,special:gs.p1.special,state:gs.p1.state,frame:gs.p1.frame,facing:gs.p1.facing,blocking:gs.p1.blocking,grounded:gs.p1.grounded},
    p2:{x:gs.p2.x,y:gs.p2.y,hp:gs.p2.hp,hp2:gs.p2.hp2,special:gs.p2.special,state:gs.p2.state,frame:gs.p2.frame,facing:gs.p2.facing,blocking:gs.p2.blocking,grounded:gs.p2.grounded},
    timer:gs.timer,phase:gs.phase,specialName:gs.specialName||null,
    spPk:specialPhase?.pk||null,spOk:specialPhase?.ok||null,
    plantX:specialPhase?.plantX||null,frozenOpp:specialPhase?.frozenOpp||null
  });
}

// ── TIMER ─────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(gs.phase!=='fight')return;
    gs.timer--;
    if(gs.timer<=0){
      clearInterval(timerInt);
      const t1=gs.p1.hp+gs.p1.hp2,t2=gs.p2.hp+gs.p2.hp2;
      if(t1>t2)startKOSequence('p2','p1');
      else if(t2>t1)startKOSequence('p1','p2');
      else{wins.p1++;wins.p2++;gs.phase='ko';roundBanner={text:'EMPATE',t:0};
        setTimeout(()=>{if(wins.p1>=2&&wins.p2>=2){hideCanvas();$('winTxt').textContent='¡EMPATE!';show('winScreen');}
          else{currentRound++;initRound();startTimer();}},1500);}
    }
  },1000);
}

// ── RENDER ────────────────────────────────────────────────────────
function renderLoop(){
  ctx.clearRect(0,0,W,H);
  if(gs.phase==='special'&&specialPhase){
    drawSpecial(); // maneja TODO: bg, oponente, lanzador
  } else {
    drawBg();
    // dibujar fighters normales — orden por posición
    if(gs.p1.x<gs.p2.x){drawFighter('p1');drawFighter('p2');}
    else{drawFighter('p2');drawFighter('p1');}
    if(koSeq&&koSeq.phase!=='done')drawKOOverlay();
  }
  drawHUD();
  if(gs.phase==='fight')drawControls();
  requestAnimationFrame(renderLoop);
}

// ── CHAR SELECT ───────────────────────────────────────────────────
let myCharChoice=null,selIdleTimer=0,selIdleFrame=0,selAnimId=null;
function showSelectScreen(){
  show('selectScreen');
  function animSel(){
    selIdleTimer++;if(selIdleTimer>8){selIdleTimer=0;selIdleFrame++;}
    ['machi','mauron'].forEach((ch,i)=>{
      const sc=document.getElementById('selCanvas'+i),sx=sc.getContext('2d');
      sx.clearRect(0,0,140,200);
      const frames=SP[ch]?.idle||[];
      const img=frames[selIdleFrame%Math.max(1,frames.length)];
      if(img){const s=200/img.height,dw=img.width*s;sx.drawImage(img,(140-dw)/2,0,dw,200);}
    });
    selAnimId=requestAnimationFrame(animSel);
  }
  if(selAnimId)cancelAnimationFrame(selAnimId);animSel();
}
window.selectChar=function(idx){
  if(selAnimId)cancelAnimationFrame(selAnimId);
  myCharChoice=idx===0?'machi':'mauron';
  document.getElementById('selCard'+idx).style.borderColor=idx===0?'#FFD700':'#00FF7F';
  setTimeout(()=>launchGame(),400);
};
function launchGame(){
  SP._p1=SP[myCharChoice];
  SP._p2=SP[myCharChoice==='machi'?'mauron':'machi'];
  initGS();setupSync();setupTouch();
  showCanvas();
  requestAnimationFrame(renderLoop);
  if(myRole==='host'){
    startTimer();
    if(window._hostInterval)clearInterval(window._hostInterval);
    window._hostInterval=setInterval(hostTick,TICK);
  }
}

async function startGame(){
  show('waitingScreen');$('waitMsg').textContent='Cargando sprites...';
  await loadSprites();
  myKey=myRole==='host'?'p1':'p2';oppKey=myRole==='host'?'p2':'p1';
  showSelectScreen();
}

$('btnRevanche').onclick=async()=>{
  if(vsMode==='cpu'){startGame();return;}
  if(myRole==='host'){await update(roomRef,{status:'ready',state:null});startGame();}
  else{show('waitingScreen');$('waitMsg').textContent='Esperando revancha...';}
};
$('btnLobbyBack').onclick=async()=>{
  if(roomRef){await remove(roomRef);roomRef=null;}
  roomCode=null;myRole=null;vsMode=null;show('lobbyScreen');
};

// ── KEYBOARD ──────────────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  if(K[e.code])return;K[e.code]=true;
  if(e.code==='KeyF'||e.code==='Space'){myInput.attack=true;pushInput();}
  if(e.code==='KeyH'){myInput.special=true;pushInput();}
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);myInput.block=!!(K['KeyG']||K['KeyL']);pushInput();
});
window.addEventListener('keyup',e=>{
  K[e.code]=false;
  if(e.code==='KeyF'||e.code==='Space')myInput.attack=false;
  if(e.code==='KeyH')myInput.special=false;
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);myInput.block=!!(K['KeyG']||K['KeyL']);pushInput();
});

// ── TOUCH ─────────────────────────────────────────────────────────
function setupTouch(){
  function getPos(t){const rect=canvas.getBoundingClientRect();return{x:(t.clientX-rect.left)*(W/rect.width),y:(t.clientY-rect.top)*(H/rect.height)};}
  const near=(p,b)=>Math.hypot(p.x-b.x,p.y-b.y)<b.r*1.4;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const p=getPos(t);
      if(near(p,BTNS.L)){myInput.left=true;pushInput();}
      if(near(p,BTNS.R)){myInput.right=true;pushInput();}
      if(near(p,BTNS.UP)){myInput.jump=true;pushInput();setTimeout(()=>{myInput.jump=false;pushInput();},200);}
      if(near(p,BTNS.P)){myInput.attack=true;pushInput();setTimeout(()=>{myInput.attack=false;pushInput();},200);}
      if(near(p,BTNS.B)){myInput.block=true;pushInput();}
      if(near(p,BTNS.S)){myInput.special=true;pushInput();setTimeout(()=>{myInput.special=false;pushInput();},200);}
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();myInput.left=false;myInput.right=false;myInput.block=false;pushInput();
  },{passive:false});
}
</script>
