<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CampCon ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a1a;overflow:hidden;width:100vw;height:100vh;font-family:'Arial Black',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;padding:20px;}
.screen.hidden{display:none;}
#loginScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);}
#loginScreen h1{font-size:clamp(36px,10vw,72px);color:#FFD700;text-shadow:0 0 30px #FF6600;letter-spacing:6px;margin-bottom:8px;}
#loginScreen p{color:#aaa;font-size:clamp(12px,3vw,18px);margin-bottom:40px;}
.btnGoogle{display:flex;align-items:center;gap:12px;background:#fff;color:#333;font-family:'Arial Black',sans-serif;font-size:clamp(14px,3.5vw,20px);padding:14px 28px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.btnGoogle img{width:28px;}
#lobbyScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:12px;}
#lobbyScreen h2{font-size:clamp(22px,6vw,42px);color:#FFD700;margin-bottom:4px;}
.userInfo{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);padding:10px 20px;border-radius:30px;}
.userInfo img{width:36px;height:36px;border-radius:50%;}
.userInfo span{font-size:14px;color:#ddd;}
.menuCards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.menuCard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:150px;padding:20px 12px;border-radius:14px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.menuCard:hover{transform:scale(1.05);}
.menuCard.active{border-color:#fff;}
.menuCard .icon{font-size:36px;}
.menuCard .label{font-family:'Arial Black',sans-serif;font-size:13px;text-align:center;letter-spacing:1px;}
.cardCPU{background:linear-gradient(135deg,#3a006f,#9b00d4);}
.cardMulti{background:linear-gradient(135deg,#003a8c,#0077ff);}

.subMenu h3{font-size:14px;color:#aaa;letter-spacing:2px;margin-bottom:4px;}
.btnMain{font-family:'Arial Black',sans-serif;font-size:clamp(13px,3.5vw,16px);padding:11px 28px;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;margin:2px;}
.btnCreate{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnCPU{background:linear-gradient(135deg,#6600ff,#cc00ff);color:#fff;}
.btnJoin{background:linear-gradient(135deg,#0066ff,#00ccff);color:#fff;}
.btnLogout{background:rgba(255,255,255,0.08);color:#aaa;font-size:12px;padding:8px 16px;}
#roomCodeInput{font-family:'Arial Black',sans-serif;font-size:20px;padding:11px 18px;border-radius:8px;border:2px solid #0066ff;background:#111;color:#fff;text-align:center;letter-spacing:4px;width:140px;text-transform:uppercase;}
#joinForm{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
#waitingScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a);gap:20px;}
#waitingScreen h2{font-size:clamp(20px,5vw,36px);color:#FFD700;}
.roomCode{font-size:clamp(36px,10vw,64px);color:#00ccff;letter-spacing:8px;background:rgba(0,204,255,0.1);padding:16px 32px;border-radius:12px;border:2px solid #00ccff;}
.waitDots{font-size:18px;color:#aaa;}
.btnCancel{background:rgba(255,255,255,0.1);color:#aaa;font-size:14px;padding:10px 24px;}
#winScreen{background:rgba(0,0,0,0.92);gap:20px;}
#winScreen h2{font-size:clamp(32px,9vw,80px);color:#FFD700;text-shadow:0 0 40px #FF6600;text-align:center;}
.btnRevanche{background:linear-gradient(135deg,#FF6600,#FFD700);color:#000;}
.btnLobby{background:rgba(255,255,255,0.1);color:#fff;font-size:14px;padding:10px 24px;}
#salasList{width:100%;max-width:380px;max-height:160px;overflow-y:auto;margin:4px 0;}
.salaItem{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 16px;margin-bottom:6px;}
.salaItem span{font-size:13px;color:#ddd;}
.salaItem strong{color:#FFD700;}
.btnUnirse{font-family:'Arial Black',sans-serif;font-size:11px;padding:6px 14px;background:linear-gradient(135deg,#0066ff,#00ccff);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.noSalas{font-size:12px;color:#555;text-align:center;padding:8px;}
</style>
</head>
<body>

<div class="screen" id="loginScreen">
  <h1>⚡ CAMPCON ⚡</h1>
  <p>Banda del Estu — Machi vs Mauron</p>
  <button class="btnGoogle" id="btnGoogle">

    Entrar con Google

</div>

<div class="screen hidden" id="lobbyScreen">
  <h2>🥊 CAMPCON</h2>
  <div class="userInfo">
    <img id="userAvatar" src="" alt="">
    <span id="userName"></span>
  </div>

  <!-- Menú principal -->
  <div class="menuCards">
    <div class="menuCard cardCPU" id="cardCPU">
      <div class="icon">🤖</div>
      <div class="label">VS CPU</div>
    </div>
    <div class="menuCard cardMulti" id="cardMulti">
      <div class="icon">🌐</div>
      <div class="label">MULTIJUGADOR</div>

  <!-- Sub-menú CPU -->
  <div class="subMenu hidden" id="subCPU">

    <button class="btnMain btnCPU" id="btnCPU">⚡ JUGAR AHORA</button>

  <button class="btnMain btnLobby" id="btnLobbyBack">Volver al lobby</button>
</div>

<script type="module">

const firebaseConfig={
  apiKey:"AIzaSyBLii7JWZgNSoMZ7xLWeFRYvQ2Wx4snX-k",
  authDomain:"campcon-banda-estu.firebaseapp.com",
  databaseURL:"https://campcon-banda-estu-default-rtdb.firebaseio.com",

const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);

// ── UTILS ────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$(id).classList.remove('hidden');}
function showCanvas(){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$('c').style.display='block';}
function hideCanvas(){$('c').style.display='none';}
function err(msg){$('errMsg').textContent=msg;setTimeout(()=>$('errMsg').textContent='',3000);}

// ── CONSTANTS ────────────────────────────────────────────────────
const BASE='https://lucascole89.github.io/Campcon_Banda_Estu/';
const W=900,H=520,FLOOR=H-40,GR=0.5,SPMAX=100,TICK=40;
const FH=260;
const FW=100;

// ── AUTH ─────────────────────────────────────────────────────────
let currentUser=null,myRole=null,roomCode=null,roomRef=null,vsMode=null; // 'cpu'|'online'

$('btnGoogle').onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>console.error(e));
$('btnLogout').onclick=()=>signOut(auth);
onAuthStateChanged(auth,user=>{
  if(user){currentUser=user;$('userName').textContent=user.displayName||user.email;$('userAvatar').src=user.photoURL||'';show('lobbyScreen');watchSalas();}
  else{currentUser=null;show('loginScreen');}
});

// ── MENU CARDS ───────────────────────────────────────────────────
$('cardCPU').onclick=()=>{
  $('subCPU').classList.remove('hidden');
  $('subMulti').classList.add('hidden');
  $('cardCPU').classList.add('active');
  $('cardMulti').classList.remove('active');
};
$('cardMulti').onclick=()=>{
  $('subMulti').classList.remove('hidden');
  $('subCPU').classList.add('hidden');
  $('cardMulti').classList.add('active');
  $('cardCPU').classList.remove('active');
};

// ── ROOM ─────────────────────────────────────────────────────────
function watchSalas(){
  const salasRef=ref(db,'rooms');
  onValue(salasRef,snap=>{
    const list=$('salasList');
    const d=snap.val();
    if(!d){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    const abiertas=Object.entries(d).filter(([k,v])=>v.status==='waiting'&&v.host!==currentUser?.uid);
    if(!abiertas.length){list.innerHTML='<p class="noSalas">No hay salas abiertas</p>';return;}
    list.innerHTML=abiertas.map(([code,v])=>`
      <div class="salaItem">
        <span><strong>${v.hostName||'Alguien'}</strong> creó esta sala <strong>${code}</strong></span>
        <button class="btnUnirse" onclick="joinSala('${code}')">UNIRSE</button>
      </div>`).join('');
  });
}
window.joinSala=async(code)=>{
  $('roomCodeInput').value=code;
  $('btnJoin').click();
};
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}

$('btnCreate').onclick=async()=>{
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=genCode();
    roomRef=ref(db,`rooms/${roomCode}`);
    await set(roomRef,{
      host:currentUser.uid,hostName:currentUser.displayName,
      guest:null,guestName:null,status:'waiting',state:null
    });
    myRole='host';vsMode='online';
    $('displayCode').textContent=roomCode;
    $('waitMsg').textContent='Esperando al rival...';
    show('waitingScreen');
    onValue(roomRef,snap=>{
      const d=snap.val();
      if(!d)return;
      if(d.status==='ready'&&d.guest){off(roomRef);startGame();}
    });
  }catch(e){err('Error: '+e.message);console.error(e);}
};

$('btnJoin').onclick=async()=>{
  const code=$('roomCodeInput').value.trim().toUpperCase();
  if(code.length!==4){err('Código de 4 letras');return;}
  if(!currentUser){err('Necesitás estar logueado');return;}
  try{
    roomCode=code;roomRef=ref(db,`rooms/${roomCode}`);
    const snap=await get(roomRef);
    if(!snap.exists()){err('Sala no encontrada');return;}
    const d=snap.val();
    if(d.status!=='waiting'){err('Sala ya en juego');return;}
    await update(roomRef,{guest:currentUser.uid,guestName:currentUser.displayName,status:'ready'});
    myRole='guest';vsMode='online';
    startGame();
  }catch(e){err('Error: '+e.message);console.error(e);}
};

$('btnCPU').onclick=()=>{
  myRole='host';vsMode='cpu';roomCode=null;roomRef=null;
  startGame();
};

$('btnCancel').onclick=async()=>{
  if(roomRef)await remove(roomRef);
  roomRef=null;roomCode=null;myRole=null;vsMode=null;
  show('lobbyScreen');
};

// ── SPRITES ──────────────────────────────────────────────────────
function removeChroma(img){
  const oc=document.createElement('canvas');oc.width=img.naturalWidth;oc.height=img.naturalHeight;
  const ox=oc.getContext('2d');ox.drawImage(img,0,0);
  const d=ox.getImageData(0,0,oc.width,oc.height);
  for(let i=0;i<d.data.length;i+=4){
    const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
    // verde puro: g domina claramente sobre r y b
    if(g>120&&g-r>60&&g-b>60)d.data[i+3]=0;
    // azul puro: b domina claramente
    else if(b>120&&b-r>60&&b-g>40)d.data[i+3]=0;
  }
  ox.putImageData(d,0,0);return oc;
}
async function loadImg(path){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>res(removeChroma(img));
    img.onerror=()=>{console.warn('MISSING:',path);res(null);};
    img.src=BASE+path;
  });
}
const PATHS={
  machi:{
    idle:['Machi/Machi_Idle_01.png','Machi/Machi_Idle_02.png','Machi/Machi_Idle_03.png','Machi/Machi_Idle_04.png','Machi/Machi_Idle_05.png'],
    walk:['Machi/Machi_Caminata_01.png','Machi/Machi_Caminata_02.png','Machi/Machi_Caminata_03.png','Machi/Machi_Caminata_04.png'],
    jump:['Machi/Machi_Salto_01.png','Machi/Machi_Salto_02.png','Machi/Machi_Salto_03.png','Machi/Machi_Salto_04.png'],
    attack:['Machi/Machi_Pu%C3%B1o_Basico_01.png','Machi/Machi_Pu%C3%B1o_Basico_02.png','Machi/Machi_Pu%C3%B1o_Basico_03.png','Machi/Machi_Pu%C3%B1o_Basico_04.png'],
    special:['Machi/Machi_Ataque_Especial_01.png','Machi/Machi_Ataque_Especial_02.png','Machi/Machi_Ataque_Especial_03.png','Machi/Machi_Ataque_Especial_04.png','Machi/Machi_Ataque_Especial_05.png','Machi/Machi_Ataque_Especial_06.png','Machi/Machi_Ataque_Especial_07.png','Machi/Machi_Ataque_Especial_08.png'],
    block:['Machi/Machi_Bloqueo_01.png','Machi/Machi_Bloqueo_02.png','Machi/Machi_Bloqueo_03.png'],
    hurt:['Machi/Machi_Hit_Reaction.png'],ko:['Machi/Machi_Vencido.png'],
    celeb:['Machi/Machi_Festejo_01.png','Machi/Machi_Festejo_02.png','Machi/Machi_Festejo_03.png','Machi/Machi_Festejo_04.png'],
    jumpKick:['Machi/Machi_Jump_Kick.png'],jumpPunch:['Machi/Machi_Jump_Punch.png'],
  },
  mauron:{
    idle:['Mauron/Mauron_Idle_01.png','Mauron/Mauron_Idle_02.png','Mauron/Mauron_Idle_03.png','Mauron/Mauron_Idle_04.png','Mauron/Mauron_Idle_05.png'],
    walk:['Mauron/Mauron_Walk_01.png','Mauron/Mauron_Walk_02.png','Mauron/Mauron_Walk_03.png','Mauron/Mauron_Walk_04.png'],
    jump:['Mauron/Mauron_Jump_01.png','Mauron/Mauron_Jump_02.png','Mauron/Mauron_Jump_03.png','Mauron/Mauron_Jump_04_aterrizaje.png'],
    attack:['Mauron/Mauron_Punch_01.png','Mauron/Mauron_Punch_02.png'],
    special:['Mauron/Mauron_Special_Attack_01.png','Mauron/Mauron_Special_Attack_02.png','Mauron/Mauron_Special_Attack_03.png','Mauron/Mauron_Special_Attack_04.png'],
    plants:['Mauron/Mauron_Special_Attack_05_Modulo_Plantas.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_01.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_02.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_03.png','Mauron/Mauron_Special_Attack_05_Modulo_Plantas_04.png'],
    block:['Mauron/Mauron_Block_01.png'],hurt:['Mauron/Mauron_Hit_against_01.png'],
    ko:['Mauron/Mauron_defeated_01.png','Mauron/Mauron_Defeated_en_piso_02.png'],
    celeb:['Mauron/Mauron_Festejo_01.png','Mauron/Mauron_Festejo_02.png','Mauron/Mauron_Festejo_03.png','Mauron/Mauron_Festejo_04.png'],
    jumpKick:['Mauron/Mauron_Kick_Jump.png'],jumpPunch:['Mauron/Mauron_Punch_Jump.png'],
  }
};
let SP={machi:{},mauron:{},bg:null},spritesLoaded=false;
async function loadSprites(){
  if(spritesLoaded)return;
  async function loadGroup(paths){
    const out={};
    for(const[k,arr]of Object.entries(paths))out[k]=await Promise.all(arr.map(p=>loadImg(p)));
    return out;
  }
  [SP.machi,SP.mauron,SP.bg]=await Promise.all([loadGroup(PATHS.machi),loadGroup(PATHS.mauron),loadImg('Escenarios_001_Estudiantil_v2.png')]);
  spritesLoaded=true;
}

// ── CANVAS ───────────────────────────────────────────────────────
const canvas=$('c'),ctx=canvas.getContext('2d');
function resize(){
  const dpr=window.devicePixelRatio||1;
  const s=Math.min(innerWidth/W,innerHeight/H);
  canvas.style.width=s*W+'px';canvas.style.height=s*H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// ── GAME STATE ───────────────────────────────────────────────────
let gs,fTimer,hitCD,inv,bgOffset,tickN,specialPhase,timerInt,myKey,oppKey;
let myInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let oppInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
let inputRef=null,oppInputRef=null,stateRef=null;

function initGS(){
  gs={
    p1:{x:200,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:1,blocking:false,grounded:true,stTimer:0},
    p2:{x:700,y:FLOOR,vy:0,hp:100,special:0,state:'idle',frame:0,facing:-1,blocking:false,grounded:true,stTimer:0},
    timer:90,phase:'fight',specialName:null
  };
  fTimer={p1:0,p2:0};hitCD={p1:0,p2:0};inv={p1:0,p2:0};
  bgOffset=0;tickN=0;specialPhase=null;
  myInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
  oppInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
}

// ── SPRITE HELPERS ───────────────────────────────────────────────
function getSP(pk){return pk==='p1'?SP.machi:SP.mauron;}
function getFrames(pk,st){
  const s=getSP(pk),state=st||gs[pk].state;
  if(state==='idle')return s.idle||[];
  if(state==='walk')return s.walk||[];
  if(state==='jump')return s.jump||[];
  if(state==='attack')return s.attack||[];
  if(state==='special')return s.special||[];
  if(state==='block')return s.block||[];
  if(state==='hurt')return s.hurt||[];
  if(state==='ko')return s.ko||[];
  if(state==='celeb')return s.celeb||[];
  return s.idle||[];
}

// ── DRAW ─────────────────────────────────────────────────────────
function drawBg(){
  if(SP.bg){const bW=W*1.4,bH=H*0.78;ctx.drawImage(SP.bg,-bgOffset*(bW-W),H-bH,bW,bH);}
  else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0d1b2a');g.addColorStop(0.65,'#1b3a5c');g.addColorStop(1,'#c8a060');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#a07040';ctx.fillRect(0,FLOOR,W,H-FLOOR);}
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}
function drawFighter(pk){
  const f=gs[pk],frames=getFrames(pk),FH=170;
  const img=frames[Math.min(f.frame,Math.max(0,frames.length-1))];
  if(!img){
    ctx.fillStyle=pk==='p1'?'#8B6914':'#3a6b30';
    ctx.fillRect(f.x-45,f.y-FH,90,FH);
    ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText(pk==='p1'?'MACHI':'MAURON',f.x,f.y-FH/2);
    return;
  }
  const sc=FH/img.height||1,dw=img.width*sc;
  ctx.save();
  ctx.translate(f.x, f.y-FH);
  if(f.facing<0) ctx.transform(-1,0,0,1,dw,0);
  if(f.state==='hurt')ctx.globalAlpha=0.65;
  ctx.drawImage(img, f.facing>0 ? -dw/2 : dw/2-dw, 0, dw, FH);
  ctx.restore();
  if(f.blocking){
    ctx.save();ctx.globalAlpha=0.28;ctx.fillStyle='#4af';
    ctx.beginPath();ctx.ellipse(f.x+(f.facing>0?30:-30),f.y-FH/2,35,68,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
}
function drawHUD(){
  const bW=310,bH=20,spH=9,y1=12,y2=y1+bH+3;
  const bar=(x,w,pct,right)=>{ctx.fillStyle='#111';ctx.fillRect(x,y1,w,bH);const fw=w*Math.max(0,pct);ctx.fillStyle='#e63946';ctx.fillRect(right?x+w-fw:x,y1,fw,bH);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.strokeRect(x,y1,w,bH);};
  const spBar=(x,w,pct,col,right)=>{ctx.fillStyle='#111';ctx.fillRect(x,y2,w,spH);const fw=w*Math.max(0,pct);ctx.fillStyle=col;ctx.fillRect(right?x+w-fw:x,y2,fw,spH);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y2,w,spH);if(pct>=1){ctx.save();ctx.globalAlpha=0.5+0.5*Math.sin(Date.now()*0.008);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x,y2,w,spH);ctx.restore();}};
  bar(10,bW,gs.p1.hp/100,false);spBar(10,bW,gs.p1.special/SPMAX,'#FFD700',false);
  ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='left';
  ctx.fillText(vsMode==='cpu'?'VOS':'MACHI',12,y1+14);
  bar(W-10-bW,bW,gs.p2.hp/100,true);spBar(W-10-bW,bW,gs.p2.special/SPMAX,'#00FF7F',true);
  ctx.textAlign='right';ctx.fillText(vsMode==='cpu'?'CPU':'MAURON',W-12,y1+14);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(W/2-28,8,56,30,6);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=gs.timer<=10?'#ff4444':'#fff';ctx.font='bold 22px Arial Black';ctx.textAlign='center';ctx.fillText(Math.ceil(gs.timer),W/2,30);
  if(gs.p1.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#FFD700';ctx.font='bold 9px Arial';ctx.textAlign='left';ctx.fillText('⚡LISTO!',12,y2+spH+10);ctx.restore();}
  if(gs.p2.special>=SPMAX){ctx.save();ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()*0.007);ctx.fillStyle='#00FF7F';ctx.font='bold 9px Arial';ctx.textAlign='right';ctx.fillText('⚡LISTO!',W-12,y2+spH+10);ctx.restore();}
}
function drawControls(){
  ctx.save();ctx.globalAlpha=0.55;
  const B=(x,y,r,lbl,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold ${r*0.65}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,x,y);ctx.textBaseline='alphabetic';};
  B(48,H-58,27,'◀','#334');B(112,H-58,27,'▶','#334');B(80,H-114,27,'▲','#343');
  B(W-48,H-58,27,'P','#443');B(W-104,H-58,27,'B','#433');B(W-160,H-88,27,'S','#334');
  ctx.restore();
}
function drawSpecial(){
  const s=specialPhase;if(!s)return;
  const isMachi=s.name==='MACHI';
  const attackName=isMachi?'CHAMPAGNE SUPERNOVA':'ABSOLUT PLANTS';
  const col=isMachi?'#FFD700':'#00FF7F';
  ctx.save();
  ctx.fillStyle=s.t%8<4?'rgba(255,200,0,0.18)':'rgba(0,50,200,0.18)';ctx.fillRect(0,0,W,H);
  const maxX=W*0.55,px=s.t<35?-maxX+(s.t/35)*maxX:(s.t>110?maxX-((s.t-110)/40)*maxX*2:0);
  ctx.translate(px,0);
  const grad=ctx.createLinearGradient(0,H*0.28,maxX,H*0.72);
  grad.addColorStop(0,'rgba(0,0,0,0.96)');grad.addColorStop(1,col+'22');
  ctx.fillStyle=grad;ctx.fillRect(0,H*0.28,maxX,H*0.44);
  ctx.strokeStyle=col;ctx.lineWidth=3;ctx.strokeRect(0,H*0.28,maxX,H*0.44);
  const csp=isMachi?SP.machi:SP.mauron;
  const cf=(csp.celeb||[])[Math.floor(s.t/15)%Math.max(1,(csp.celeb||[]).length)];
  if(cf){const ch=H*0.38,cw=cf.width*(ch/cf.height);ctx.save();ctx.translate(maxX*0.72,H*0.72);ctx.scale(-1,-1);ctx.drawImage(cf,-cw/2,0,cw,-ch);ctx.restore();}
  ctx.shadowColor=col;ctx.shadowBlur=25;ctx.fillStyle=col;
  ctx.font='bold '+Math.floor(W*0.042)+'px Arial Black';ctx.textAlign='center';ctx.fillText(attackName,maxX*0.42,H*0.52);
  ctx.font='bold '+Math.floor(W*0.025)+'px Arial';ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.fillText(s.name,maxX*0.42,H*0.38);
  ctx.restore();
  s.t++;
  if(s.t>=150){specialPhase=null;gs.phase='fight';gs.specialName=null;}
}

// ── PHYSICS ──────────────────────────────────────────────────────
function physicsTick(){
  ['p1','p2'].forEach(pk=>{
    const p=gs[pk];
    if(p.state==='ko')return;
    if(inv[pk]>0)inv[pk]--;
    if(hitCD[pk]>0)hitCD[pk]--;
    if(!p.grounded){p.vy+=GR;p.y+=p.vy;}
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.grounded=true;if(p.state==='jump')p.state='idle';}
    fTimer[pk]++;
    const spd=p.state==='special'?6:p.state==='attack'?5:p.state==='walk'?7:10;
    if(fTimer[pk]>=spd){fTimer[pk]=0;p.frame++;}
    const fr=getFrames(pk);
    if(fr.length){
      const loop=!['ko','hurt'].includes(p.state);
      if(p.frame>=fr.length)p.frame=loop?0:fr.length-1;
    }
    if(p.state==='attack'&&p.frame>=(getFrames(pk,'attack').length||1)&&fTimer[pk]===0){p.state='idle';p.frame=0;}
    if(p.state==='hurt'&&p.frame>=(getFrames(pk,'hurt').length||1)&&fTimer[pk]===0){p.state='idle';p.frame=0;}
  });
  // no overlap — mantener distancia mínima entre personajes
  const minDist=FW+20;
  if(Math.abs(gs.p1.x-gs.p2.x)<minDist){
    const push=(minDist-Math.abs(gs.p1.x-gs.p2.x))/2;
    if(gs.p1.x<gs.p2.x){gs.p1.x-=push;gs.p2.x+=push;}
    else{gs.p1.x+=push;gs.p2.x-=push;}
  }
  ['p1','p2'].forEach(pk=>{gs[pk].x=Math.max(50,Math.min(W-50,gs[pk].x));});
}

// ── APPLY INPUT ───────────────────────────────────────────────────
function applyInput(pk,inp){
  const p=gs[pk];if(p.state==='ko')return;
  const ok=pk==='p1'?'p2':'p1',opp=gs[ok];
  if(inp.left){p.x-=2.5;if(p.grounded&&!['attack','special'].includes(p.state))p.state='walk';}
  else if(inp.right){p.x+=2.5;if(p.grounded&&!['attack','special'].includes(p.state))p.state='walk';}
  else if(p.state==='walk')p.state='idle';
  p.x=Math.max(50,Math.min(W-50,p.x));
  if(inp.jump&&p.grounded&&!['attack','special'].includes(p.state)){p.vy=-11;p.grounded=false;p.state='jump';p.frame=0;}
  p.blocking=!!(inp.block&&p.grounded);
  if(p.blocking&&!['attack','special'].includes(p.state))p.state='block';
  else if(!p.blocking&&p.state==='block')p.state='idle';
  if(!['attack','special','hurt','ko','block'].includes(p.state))p.facing=opp.x>p.x?1:-1;
  if(inp.attack&&!['ko','hurt','special'].includes(p.state)&&hitCD[pk]===0){
    p.state='attack';p.frame=0;
    const reach=90, bx=p.x+(p.facing>0?FW/2:-FW/2-reach);
    if(bx<opp.x+FW/2&&bx+reach>opp.x-FW/2&&Math.abs(p.y-opp.y)<FH){
      if(!opp.blocking&&inv[ok]===0){
        opp.hp=Math.max(0,opp.hp-10);opp.state='hurt';inv[ok]=18;
        p.special=Math.min(SPMAX,p.special+12);
        if(opp.hp<=0){opp.state='ko';triggerEndGame();}
      } else if(opp.blocking){opp.hp=Math.max(0,opp.hp-2);p.special=Math.min(SPMAX,p.special+5);}
      hitCD[pk]=25;
    }
  }
  if(inp.special&&p.special>=SPMAX&&!['ko','hurt','special'].includes(p.state)){
    p.special=0;p.state='special';p.frame=0;
    gs.phase='special';gs.specialName=pk==='p1'?'MACHI':'MAURON';
    specialPhase={name:gs.specialName,t:0};
    if(!opp.blocking){opp.hp=Math.max(0,opp.hp-35);if(opp.hp<=0){opp.state='ko';triggerEndGame();}}
    else opp.hp=Math.max(0,opp.hp-7);
  }
}

// ── CPU AI ────────────────────────────────────────────────────────
let cpuTimer=0,cpuAction=null,cpuActionTimer=0;
const cpuInput={left:false,right:false,jump:false,attack:false,block:false,special:false};
function updateCPU(){
  const cpu=gs.p2,player=gs.p1;
  if(cpu.state==='ko')return;
  cpuTimer++;
  const dist=Math.abs(cpu.x-player.x);
  const rand=Math.random();

  // limpiar inputs
  cpuInput.left=false;cpuInput.right=false;cpuInput.jump=false;
  cpuInput.attack=false;cpuInput.block=false;cpuInput.special=false;

  // acercarse si lejos
  if(dist>150){
    cpuInput.left=cpu.x>player.x;
    cpuInput.right=cpu.x<player.x;
  }

  // atacar solo cada ~40 ticks y si está cerca
  if(dist<140&&dist>30&&cpuTimer%40===0){
    if(cpu.special>=SPMAX&&rand<0.2) cpuInput.special=true;
    else cpuInput.attack=true;
  }

  // salto ocasional
  if(rand<0.008&&cpu.grounded&&dist>100) cpuInput.jump=true;

  // bloquear si el jugador ataca y está cerca
  if(player.state==='attack'&&dist<150&&rand<0.25) cpuInput.block=true;
}

// ── GAME TICK (host) ──────────────────────────────────────────────
function hostTick(){
  if(gs.phase==='fight'){
    if(vsMode==='cpu')updateCPU();
    applyInput('p1',vsMode==='online'?(myRole==='host'?myInput:oppInput):myInput);
    applyInput('p2',vsMode==='online'?(myRole==='guest'?myInput:oppInput):cpuInput);
    physicsTick();
    if(vsMode==='online'&&tickN%2===0)pushState();
  } else if(gs.phase==='special'){
    physicsTick();
    if(vsMode==='online'&&tickN%2===0)pushState();
  }
  tickN++;
}

// ── SYNC ─────────────────────────────────────────────────────────
function setupSync(){
  if(vsMode!=='online')return;
  inputRef=ref(db,`rooms/${roomCode}/input/${myKey}`);
  oppInputRef=ref(db,`rooms/${roomCode}/input/${oppKey}`);
  stateRef=ref(db,`rooms/${roomCode}/state`);
  onValue(oppInputRef,snap=>{const d=snap.val();if(d)Object.assign(oppInput,d);});
  if(myRole==='guest'){
    onValue(stateRef,snap=>{
      const d=snap.val();
      if(!d)return;
      Object.assign(gs.p1,d.p1);Object.assign(gs.p2,d.p2);
      gs.timer=d.timer;gs.phase=d.phase||'fight';
      if(d.specialName&&!specialPhase){specialPhase={name:d.specialName,t:0};}
    });
  }
}
function pushInput(){if(inputRef&&vsMode==='online')set(inputRef,{...myInput});}
function pushState(){
  if(!stateRef||myRole!=='host'||vsMode!=='online')return;
  set(stateRef,{
    p1:{x:gs.p1.x,y:gs.p1.y,hp:gs.p1.hp,special:gs.p1.special,state:gs.p1.state,frame:gs.p1.frame,facing:gs.p1.facing,blocking:gs.p1.blocking,grounded:gs.p1.grounded},
    p2:{x:gs.p2.x,y:gs.p2.y,hp:gs.p2.hp,special:gs.p2.special,state:gs.p2.state,frame:gs.p2.frame,facing:gs.p2.facing,blocking:gs.p2.blocking,grounded:gs.p2.grounded},
    timer:gs.timer,phase:gs.phase,specialName:gs.specialName||null
  });
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(gs.phase!=='fight')return;
    gs.timer--;
    if(gs.timer<=0){clearInterval(timerInt);triggerEndGame();}
  },1000);
}
function triggerEndGame(){
  if(gs.phase==='ko')return;
  gs.phase='ko';clearInterval(timerInt);
  let winner;
  if(gs.p1.hp<=0)winner='p2';
  else if(gs.p2.hp<=0)winner='p1';
  else winner=gs.p1.hp>gs.p2.hp?'p1':gs.p2.hp>gs.p1.hp?'p2':null;
  if(winner){gs[winner].state='celeb';const l=winner==='p1'?'p2':'p1';gs[l].state='ko';}
  const wname=winner==='p1'?(vsMode==='cpu'?'VOS':'MACHI'):winner==='p2'?(vsMode==='cpu'?'CPU':'MAURON'):'EMPATE';
  setTimeout(()=>{
    hideCanvas();
    $('winTxt').textContent=wname==='EMPATE'?'¡EMPATE!':`¡GANÓ ${wname}!`;
    show('winScreen');
  },1800);
}

// ── RENDER LOOP ───────────────────────────────────────────────────
function renderLoop(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  if(gs.p1.x<gs.p2.x){drawFighter('p1');drawFighter('p2');}else{drawFighter('p2');drawFighter('p1');}
  if(gs.phase==='special')drawSpecial();
  drawHUD();drawControls();
  requestAnimationFrame(renderLoop);
}

// ── INPUT ─────────────────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  if(K[e.code])return;K[e.code]=true;
  if(e.code==='KeyF'||e.code==='Space'){myInput.attack=true;pushInput();}
  if(e.code==='KeyH'){myInput.special=true;pushInput();}
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);
  myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);
  myInput.block=!!(K['KeyG']||K['KeyL']);
  pushInput();
});
window.addEventListener('keyup',e=>{
  K[e.code]=false;
  if(e.code==='KeyF'||e.code==='Space'){myInput.attack=false;}
  if(e.code==='KeyH'){myInput.special=false;}
  myInput.left=!!(K['KeyA']||K['ArrowLeft']);
  myInput.right=!!(K['KeyD']||K['ArrowRight']);
  myInput.jump=!!(K['KeyW']||K['ArrowUp']);
  myInput.block=!!(K['KeyG']||K['KeyL']);
  pushInput();
});

// ── TOUCH ─────────────────────────────────────────────────────────
function setupTouch(){
  const s=()=>parseFloat(canvas.style.width)/W;
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      const p={x:t.clientX/s(),y:t.clientY/s()};
      const near=(cx,cy,r)=>Math.hypot(p.x-cx,p.y-cy)<r;
      if(near(48,H-58,42)){myInput.left=true;pushInput();}
      if(near(112,H-58,42)){myInput.right=true;pushInput();}
      if(near(80,H-114,42)){myInput.jump=true;pushInput();setTimeout(()=>{myInput.jump=false;pushInput();},100);}
      if(near(W-48,H-58,42)){myInput.attack=true;pushInput();setTimeout(()=>{myInput.attack=false;pushInput();},120);}
      if(near(W-104,H-58,42)){myInput.block=true;pushInput();}
      if(near(W-160,H-88,42)){myInput.special=true;pushInput();setTimeout(()=>{myInput.special=false;pushInput();},120);}
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    // solo soltamos direccionales y bloqueo — ataques se auto-sueltan con timeout
    myInput.left=false;myInput.right=false;myInput.block=false;
    pushInput();
  },{passive:false});
}

// ── START GAME ────────────────────────────────────────────────────
async function startGame(){
  show('waitingScreen');
  $('waitMsg').textContent='Cargando sprites...';
  await loadSprites();
  myKey=myRole==='host'?'p1':'p2';
  oppKey=myRole==='host'?'p2':'p1';
  initGS();
  setupSync();
  setupTouch();
  showCanvas();
  requestAnimationFrame(renderLoop);
  if(myRole==='host'){
    startTimer();
    setInterval(hostTick,TICK);
  }
}

// ── WIN BUTTONS ───────────────────────────────────────────────────
$('btnRevanche').onclick=async()=>{
  if(vsMode==='cpu'){startGame();return;}
  if(myRole==='host'){await update(roomRef,{status:'ready',state:null});startGame();}
  else{show('waitingScreen');$('waitMsg').textContent='Esperando revancha...';}
};
$('btnLobbyBack').onclick=async()=>{
  if(roomRef){await remove(roomRef);roomRef=null;}
  roomCode=null;myRole=null;vsMode=null;
  show('lobbyScreen');
};
